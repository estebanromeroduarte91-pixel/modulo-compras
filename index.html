function cuentaById(id){ return getPlanCuentas().find(c=>c.id===id)||{codigo:'???',nombre:'Cuenta desconocida'}; }
function cuentaByCode(code){ return getPlanCuentas().find(c=>c.codigo===code)||{id:code,codigo:code,nombre:code}; }

function crearAsiento(asiento){
  const all=getAsientos();
  // Dedup: skip if asiento with same id already exists
  if(asiento.id && all.some(a=>a.id===asiento.id)) return;
  asiento.numero=DB.nextAsiento();
  all.push(asiento);
  setAsientos(all);
}


function crearAsientoVenta(v){
  const neto=+(v.total||0);
  const iva=Math.round(neto*IVA);
  const totalIva=neto+iva;
  // Cuenta cobro: Banco o Caja según método
  const cobroId=v.metodo_pago==='efectivo'?'pc-110':'pc-120';
  const cobroNombre=v.metodo_pago==='efectivo'?'Caja':'Banco';
  const cobroCodigo=v.metodo_pago==='efectivo'?'110':'120';
  crearAsiento({
    id:'as-vta-'+v.id,
    fecha:v.fecha,
    descripcion:`Venta ${v.numero}${v.cliente?' — '+v.cliente:''}`,
    ref_tipo:'venta',
    ref_id:v.id,
    ref_numero:v.numero,
    lineas:[
      {cuenta_id:cobroId,cuenta_codigo:cobroCodigo,cuenta_nombre:cobroNombre,debe:totalIva,haber:0},
      {cuenta_id:'pc-410',cuenta_codigo:'410',cuenta_nombre:'Ventas / Ingresos',debe:0,haber:neto},
      {cuenta_id:'pc-220',cuenta_codigo:'220',cuenta_nombre:'IVA Débito Fiscal',debe:0,haber:iva},
    ]
  });
}

function crearAsientoAnulacionVenta(v){
  const neto=+(v.total||0);
  const iva=Math.round(neto*IVA);
  const totalIva=neto+iva;
  const cobroId=v.metodo_pago==='efectivo'?'pc-110':'pc-120';
  const cobroNombre=v.metodo_pago==='efectivo'?'Caja':'Banco';
  const cobroCodigo=v.metodo_pago==='efectivo'?'110':'120';
  crearAsiento({
    id:'as-vtaanul-'+v.id,
    fecha:v.fecha_anulacion||today(),
    descripcion:`Anulación ${v.numero}${v.cliente?' — '+v.cliente:''}`,
    ref_tipo:'venta_anulacion',
    ref_id:'anul-'+v.id,
    ref_numero:v.numero,
    lineas:[
      {cuenta_id:'pc-410',cuenta_codigo:'410',cuenta_nombre:'Ventas / Ingresos',debe:neto,haber:0},
      {cuenta_id:'pc-220',cuenta_codigo:'220',cuenta_nombre:'IVA Débito Fiscal',debe:iva,haber:0},
      {cuenta_id:cobroId,cuenta_codigo:cobroCodigo,cuenta_nombre:cobroNombre,debe:0,haber:totalIva},
    ]
  });
}

function crearAsientoGasto(g){
  const map=getCatCuentaMap();
  const cuentaGastoId=map[g.categoria]||'pc-595';
  const cg=cuentaById(cuentaGastoId);
  // cuenta salida según método
  let salidaId='pc-120'; // default Banco
  if((g.metodo||'').toLowerCase().includes('efectivo')) salidaId='pc-110';
  if((g.metodo||'').toLowerCase().includes('remuner')||(g.categoria||'')==='RRHH') salidaId='pc-230';
  const cs=cuentaById(salidaId);
  crearAsiento({
    id:'as-'+g.id,
    fecha:g.fecha,
    descripcion:g.descripcion||'Gasto',
    ref_tipo:'gasto',
    ref_id:g.id,
    lineas:[
      {cuenta_id:cuentaGastoId,cuenta_codigo:cg.codigo,cuenta_nombre:cg.nombre,debe:+g.monto,haber:0},
      {cuenta_id:salidaId,cuenta_codigo:cs.codigo,cuenta_nombre:cs.nombre,debe:0,haber:+g.monto},
    ]
  });
}

function crearAsientoOCRecibida(oc){
  const total=+(oc.total||0);
  const iva=Math.round(total*0.19);
  const totalIva=total+iva;
  crearAsiento({
    id:'as-oc-'+oc.id,
    fecha:oc.fecha_recepcion||oc.fecha,
    descripcion:`Recepción ${oc.numero}${oc.proveedor_nombre?' — '+oc.proveedor_nombre:''}`,
    ref_tipo:'oc',
    ref_id:oc.id,
    ref_numero:oc.numero,
    lineas:[
      {cuenta_id:'pc-140',cuenta_codigo:'140',cuenta_nombre:'Inventario / Mercaderías',debe:total,haber:0},
      {cuenta_id:'pc-150',cuenta_codigo:'150',cuenta_nombre:'IVA Crédito Fiscal',debe:iva,haber:0},
      {cuenta_id:'pc-210',cuenta_codigo:'210',cuenta_nombre:'Cuentas por Pagar (Proveedores)',debe:0,haber:totalIva},
    ]
  });
}

function crearAsientoOCPago(oc){
  const totalIva=Math.round((+(oc.total||0))*1.19);
  const cuentaSalidaId=oc.metodo_pago==='caja'?'pc-110':'pc-120';
  const cuentaSalidaNombre=oc.metodo_pago==='caja'?'Caja':'Banco';
  const cuentaSalidaCodigo=oc.metodo_pago==='caja'?'110':'120';
  crearAsiento({
    id:'as-ocpago-'+oc.id,
    fecha:oc.fecha_confirmacion||oc.fecha,
    descripcion:`Pago ${oc.numero}${oc.proveedor_nombre?' — '+oc.proveedor_nombre:''}${oc.folio_factura&&oc.folio_factura!=='SIN FACTURA'?' · Fact.'+oc.folio_factura:''}`,
    ref_tipo:'oc_pago',
    ref_id:'pago-'+oc.id,
    ref_numero:oc.numero,
    lineas:[
      {cuenta_id:'pc-210',cuenta_codigo:'210',cuenta_nombre:'Cuentas por Pagar (Proveedores)',debe:totalIva,haber:0},
      {cuenta_id:cuentaSalidaId,cuenta_codigo:cuentaSalidaCodigo,cuenta_nombre:cuentaSalidaNombre,debe:0,haber:totalIva},
    ]

let _contTab='er'; // 'er' | 'diario' | 'balance' | 'cuentas' | 'mapa'

function _contarSinAsiento(){
  const asientosIds=new Set(getAsientos().map(a=>a.ref_id).filter(Boolean));
  const gastosSin=getGastos().filter(g=>!asientosIds.has(g.id)).length;
  const allOCs=getOCs();
  // OCs recibidas o confirmadas sin asiento de recepción
  const ocsSinRecepcion=allOCs.filter(o=>['recibida','confirmada'].includes(o.estado)&&!asientosIds.has(o.id)).length;
  // OCs confirmadas (no a crédito) sin asiento de pago
  const ocsSinPago=allOCs.filter(o=>o.estado==='confirmada'&&(o.metodo_pago||'banco')!=='credito'&&!asientosIds.has('pago-'+o.id)).length;
  const ocsSin=ocsSinRecepcion+ocsSinPago;
  return {gastosSin, ocsSin, ocsSinRecepcion, ocsSinPago, total:gastosSin+ocsSin};
}

    </div>
    <button class="btn btn-warning" onclick="autoClasificarTodo()" style="white-space:nowrap">🔄 Clasificar ahora</button>
  </div>`:'';

  document.getElementById('page-content').innerHTML=`
  ${banner}
  <div class="cont-tabs">
    <div class="cont-tab ${_contTab==='er'?'active':''}"     onclick="_contTab='er';renderContBody()">📊 Estado de Resultados</div>
    <div class="cont-tab ${_contTab==='balance'?'active':''}" onclick="_contTab='balance';renderContBody()">⚖️ Balance General</div>
    <div class="cont-tab ${_contTab==='diario'?'active':''}" onclick="_contTab='diario';renderContBody()">📋 Libro Diario</div>
    <div class="cont-tab ${_contTab==='cuentas'?'active':''}" onclick="_contTab='cuentas';renderContBody()">📁 Plan de Cuentas</div>
    <div class="cont-tab ${_contTab==='mapa'?'active':''}"   onclick="_contTab='mapa';renderContBody()">🔗 Mapeo Categorías</div>
  </div>
  <div id="cont-body"></div>`;
  renderContBody();
}

function autoClasificarTodo(){
  const asientosIds=new Set(getAsientos().map(a=>a.ref_id).filter(Boolean));
  const gastos=getGastos().filter(g=>!asientosIds.has(g.id));
  const allOCs=getOCs();
  const ocsSinRec=allOCs.filter(o=>['recibida','confirmada'].includes(o.estado)&&!asientosIds.has(o.id));
  const ocsSinPago=allOCs.filter(o=>o.estado==='confirmada'&&(o.metodo_pago||'banco')!=='credito'&&!asientosIds.has('pago-'+o.id));
  if(!gastos.length&&!ocsSinRec.length&&!ocsSinPago.length){ toast('✅ Todo ya está clasificado'); return; }
  gastos.forEach(g=>crearAsientoGasto(g));
  ocsSinRec.forEach(o=>crearAsientoOCRecibida(o));
  const ids2=new Set(getAsientos().map(a=>a.ref_id).filter(Boolean));
  ocsSinPago.filter(o=>!ids2.has('pago-'+o.id)).forEach(o=>crearAsientoOCPago(o));
  const total=gastos.length+ocsSinRec.length+ocsSinPago.length;
  toast(`✅ ${total} asiento${total!==1?'s':''} creado${total!==1?'s':''} correctamente`);
  renderContabilidad();
}

function confirmarClasificacion(){
  const asientosIds=new Set(getAsientos().map(a=>a.ref_id).filter(Boolean));
  const gastos=getGastos().filter(g=>!asientosIds.has(g.id));
  const allOCs=getOCs();
  // OCs sin asiento de recepción
  const ocsSinRec=allOCs.filter(o=>['recibida','confirmada'].includes(o.estado)&&!asientosIds.has(o.id));
  // OCs confirmadas (no a crédito) sin asiento de pago
  const ocsSinPago=allOCs.filter(o=>o.estado==='confirmada'&&(o.metodo_pago||'banco')!=='credito'&&!asientosIds.has('pago-'+o.id));

  gastos.forEach(g=>crearAsientoGasto(g));
  ocsSinRec.forEach(o=>crearAsientoOCRecibida(o));
  // Para las confirmadas sin pago, refrescar set de asientos primero
  const asientosIds2=new Set(getAsientos().map(a=>a.ref_id).filter(Boolean));
  ocsSinPago.filter(o=>!asientosIds2.has('pago-'+o.id)).forEach(o=>crearAsientoOCPago(o));

  const total=gastos.length+ocsSinRec.length+ocsSinPago.length;
  closeModal();
  toast(`✅ ${total} asiento${total!==1?'s':''} creado${total!==1?'s':''} correctamente`);
  renderContabilidad();
}

function renderContBody(){
  document.querySelectorAll('.cont-tab').forEach((t,i)=>{
    const tabs=['er','balance','diario','cuentas','mapa'];
    t.classList.toggle('active',tabs[i]===_contTab);
  });
  const el=document.getElementById('cont-body');
  if(!el) return;
  if(_contTab==='er')      el.innerHTML=htmlEstadoResultados();
  else if(_contTab==='balance') el.innerHTML=htmlBalance();
  else if(_contTab==='diario')  el.innerHTML=htmlLibroDiario();
  else if(_contTab==='cuentas') el.innerHTML=htmlPlanCuentas();
  else if(_contTab==='mapa')    el.innerHTML=htmlMapaCategorias();
}

// ── Estado de Resultados ──────────────────────────────────────────────────────
// ── Shared period filter ─────────────────────────────────────────────────────
// State: _pMode ('mes'|'anio'|'rango'), _pMes (YYYY-MM), _pAnio (YYYY), _pDesde/_pHasta (YYYY-MM-DD)
if(typeof window._pMode==='undefined'){ window._pMode='mes'; window._pMes=today().slice(0,7); window._pAnio=today().slice(0,4); window._pDesde=today().slice(0,7)+'-01'; window._pHasta=today(); }

function _filtrarPorPeriodo(asientos){
  return asientos.filter(a=>{
    const f=a.fecha||'';
    if(window._pMode==='mes')   return f.startsWith(window._pMes);
    if(window._pMode==='anio')  return f.startsWith(window._pAnio);
    if(window._pMode==='rango') return f>=window._pDesde && f<=window._pHasta;
    return true;
  });
}

function _periodoLabel(){
  if(window._pMode==='mes'){
    const [y,m]=window._pMes.split('-');
    return new Date(+y,+m-1,1).toLocaleDateString('es-CL',{month:'long',year:'numeric'});
  }
  if(window._pMode==='anio') return 'Año '+window._pAnio;
  return `${fmtDate(window._pDesde)} — ${fmtDate(window._pHasta)}`;
}

function _buildPeriodoUI(callbackStr){
  const allAsientos=getAsientos();
  const meses=[...new Set(allAsientos.map(a=>(a.fecha||'').slice(0,7)).filter(Boolean))].sort().reverse();
  const anios=[...new Set(meses.map(m=>m.slice(0,4)))].sort().reverse();
  const mOpts=meses.map(m=>{ const[y,mo]=m.split('-'); const n=new Date(+y,+mo-1,1).toLocaleDateString('es-CL',{month:'long',year:'numeric'}); return`<option value="${m}"${m===window._pMes?' selected':''}>${n}</option>`; }).join('');
  const yOpts=anios.map(y=>`<option value="${y}"${y===window._pAnio?' selected':''}>${y}</option>`).join('');

  return `<div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;flex-wrap:wrap;gap:12px">
    <span style="font-size:12px;font-weight:700;color:var(--gray-500);white-space:nowrap">PERÍODO:</span>
    <div style="display:flex;gap:0;border-radius:7px;overflow:hidden;border:1px solid var(--gray-200)">
      <button onclick="window._pMode='mes';${callbackStr}" style="padding:6px 14px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:${window._pMode==='mes'?'var(--primary)':'#fff'};color:${window._pMode==='mes'?'#fff':'var(--gray-600)'}">Por mes</button>
      <button onclick="window._pMode='anio';${callbackStr}" style="padding:6px 14px;font-size:12px;font-weight:600;border:none;border-left:1px solid var(--gray-200);cursor:pointer;background:${window._pMode==='anio'?'var(--primary)':'#fff'};color:${window._pMode==='anio'?'#fff':'var(--gray-600)'}">Por año</button>
      <button onclick="window._pMode='rango';${callbackStr}" style="padding:6px 14px;font-size:12px;font-weight:600;border:none;border-left:1px solid var(--gray-200);cursor:pointer;background:${window._pMode==='rango'?'var(--primary)':'#fff'};color:${window._pMode==='rango'?'#fff':'var(--gray-600)'}">Rango</button>
    </div>
    ${window._pMode==='mes'?`<select onchange="window._pMes=this.value;${callbackStr}" style="font-size:13px;padding:6px 10px">${mOpts||`<option value="${today().slice(0,7)}">Este mes</option>`}</select>`:''}
    ${window._pMode==='anio'?`<select onchange="window._pAnio=this.value;${callbackStr}" style="font-size:13px;padding:6px 10px">${yOpts||`<option value="${today().slice(0,4)}">${today().slice(0,4)}</option>`}</select>`:''}
    ${window._pMode==='rango'?`<div style="display:flex;align-items:center;gap:8px">
      <input type="date" value="${window._pDesde}" onclick="this.showPicker()" style="cursor:pointer;font-size:13px;padding:5px 8px" onchange="window._pDesde=this.value;${callbackStr}">
      <span style="color:var(--gray-400);font-size:12px">hasta</span>
      <input type="date" value="${window._pHasta}" onclick="this.showPicker()" style="cursor:pointer;font-size:13px;padding:5px 8px" onchange="window._pHasta=this.value;${callbackStr}">
    </div>`:''}
    <span style="margin-left:auto;font-size:12px;color:var(--gray-400)">${_periodoLabel()}</span>
  </div>`;
}

function htmlEstadoResultados(){
  const asientosPeriodo=_filtrarPorPeriodo(getAsientos());
  const saldos={};
  asientosPeriodo.forEach(a=>(a.lineas||[]).forEach(l=>{
    if(!saldos[l.cuenta_id]) saldos[l.cuenta_id]={cuenta_id:l.cuenta_id,codigo:l.cuenta_codigo,nombre:l.cuenta_nombre,debe:0,haber:0};
    saldos[l.cuenta_id].debe+=(+l.debe||0);
    saldos[l.cuenta_id].haber+=(+l.haber||0);
  }));
  const plan=getPlanCuentas();
  function getSaldo(cuentaId){
    const s=saldos[cuentaId]; if(!s) return 0;
    const c=plan.find(p=>p.id===cuentaId);
    if(c?.tipo==='activo'||c?.tipo==='gasto') return s.debe-s.haber;
    return s.haber-s.debe;
  }
  const gastoCuentas=plan.filter(c=>c.tipo==='gasto').map(c=>({...c,saldo:getSaldo(c.id)})).filter(c=>c.saldo!==0);
  const ingresoCuentas=plan.filter(c=>c.tipo==='ingreso').map(c=>({...c,saldo:getSaldo(c.id)})).filter(c=>c.saldo!==0);
  const totalIngresos=ingresoCuentas.reduce((s,c)=>s+c.saldo,0);
  const totalGastos=gastoCuentas.reduce((s,c)=>s+c.saldo,0);
  const resultado=totalIngresos-totalGastos;
  return `
  ${_buildPeriodoUI('renderContBody()')}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="card">
      <div style="padding:14px 16px;border-bottom:1px solid var(--gray-100)"><h3 style="margin:0;color:#15803d">📈 Ingresos</h3></div>
      <div style="padding:12px 16px">
        ${ingresoCuentas.length?ingresoCuentas.map(c=>`<div class="er-row"><span>${c.codigo} — ${c.nombre}</span><span style="color:#15803d;font-weight:600">${fmt$(c.saldo)}</span></div>`).join(''):'<div style="color:var(--gray-400);font-size:13px;padding:8px 14px">Sin ingresos registrados</div>'}
        <div class="er-row subtotal"><span>TOTAL INGRESOS</span><span style="color:#15803d">${fmt$(totalIngresos)}</span></div>
      </div>
    </div>
    <div class="card">
      <div style="padding:14px 16px;border-bottom:1px solid var(--gray-100)"><h3 style="margin:0;color:#dc2626">📉 Gastos</h3></div>
      <div style="padding:12px 16px">
        ${gastoCuentas.length?gastoCuentas.map(c=>`<div class="er-row"><span>${c.codigo} — ${c.nombre}</span><span style="color:#dc2626;font-weight:600">${fmt$(c.saldo)}</span></div>`).join(''):'<div style="color:var(--gray-400);font-size:13px;padding:8px 14px">Sin gastos registrados</div>'}
        <div class="er-row subtotal"><span>TOTAL GASTOS</span><span style="color:#dc2626">${fmt$(totalGastos)}</span></div>
      </div>
    </div>
  </div>
  <div class="er-row resultado ${resultado>=0?'positivo':'negativo'}" style="margin-top:16px">
    <span>${resultado>=0?'✅ UTILIDAD DEL PERÍODO':'❌ PÉRDIDA DEL PERÍODO'}</span>
    <span style="font-size:20px">${fmt$(Math.abs(resultado))}</span>
  </div>`;
}

// ── Balance General ───────────────────────────────────────────────────────────
function htmlBalance(){
  const asientos=_filtrarPorPeriodo(getAsientos());
  const plan=getPlanCuentas();
  const saldos={};
  asientos.forEach(a=>(a.lineas||[]).forEach(l=>{
    if(!saldos[l.cuenta_id]) saldos[l.cuenta_id]={debe:0,haber:0};
    saldos[l.cuenta_id].debe+=(+l.debe||0);
    saldos[l.cuenta_id].haber+=(+l.haber||0);
  }));
  function getSaldo(c){
    const s=saldos[c.id]||{debe:0,haber:0};
    return (c.tipo==='activo'||c.tipo==='gasto')? s.debe-s.haber : s.haber-s.debe;
  }
  const activos=plan.filter(c=>c.tipo==='activo').map(c=>({...c,saldo:getSaldo(c)})).filter(c=>c.saldo!==0);
  const pasivos=plan.filter(c=>c.tipo==='pasivo').map(c=>({...c,saldo:getSaldo(c)})).filter(c=>c.saldo!==0);
  const patrimonio=plan.filter(c=>c.tipo==='patrimonio').map(c=>({...c,saldo:getSaldo(c)})).filter(c=>c.saldo!==0);
  const totalActivos=activos.reduce((s,c)=>s+c.saldo,0);
  const totalPasivos=pasivos.reduce((s,c)=>s+c.saldo,0);
  const totalPatrim=patrimonio.reduce((s,c)=>s+c.saldo,0);
  function seccion(titulo,cuentas,color,total){
    return `<div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:${color};letter-spacing:.5px;margin-bottom:6px;padding:0 14px">${titulo}</div>
      ${cuentas.length?cuentas.map(c=>`<div class="er-row"><span style="color:var(--gray-600)">${c.codigo} ${c.nombre}</span><span style="font-weight:600">${fmt$(c.saldo)}</span></div>`).join(''):'<div style="color:var(--gray-400);font-size:13px;padding:4px 14px">—</div>'}
      <div class="er-row subtotal"><span>Total</span><span>${fmt$(total)}</span></div>
    </div>`;
  }
  return `
  ${_buildPeriodoUI('renderContBody()')}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="card" style="padding:16px">
      <h3 style="margin:0 0 14px;font-size:14px;color:var(--gray-700)">ACTIVOS</h3>
      ${seccion('Activo Circulante',activos,'#15803d',totalActivos)}
      <div class="er-row resultado ${totalActivos>0?'positivo':''}"><span>TOTAL ACTIVOS</span><span>${fmt$(totalActivos)}</span></div>
    </div>
    <div class="card" style="padding:16px">
      <h3 style="margin:0 0 14px;font-size:14px;color:var(--gray-700)">PASIVOS Y PATRIMONIO</h3>
      ${seccion('Pasivos',pasivos,'#dc2626',totalPasivos)}
      ${seccion('Patrimonio',patrimonio,'#7c3aed',totalPatrim)}
      <div class="er-row resultado ${(totalPasivos+totalPatrim)>0?'positivo':''}"><span>TOTAL PAS. + PATRIM.</span><span>${fmt$(totalPasivos+totalPatrim)}</span></div>
    </div>
  </div>
  ${Math.abs(totalActivos-(totalPasivos+totalPatrim))<1?
    '<div style="text-align:center;color:#15803d;font-weight:700;margin-top:12px;font-size:13px">✅ Balance cuadrado</div>':
    `<div style="text-align:center;color:#f59e0b;font-weight:700;margin-top:12px;font-size:13px">⚠️ Diferencia: ${fmt$(Math.abs(totalActivos-(totalPasivos+totalPatrim)))} — Agregar asientos de apertura</div>`}`;
}

// ── Libro Diario ──────────────────────────────────────────────────────────────

      <div class="asiento-body">
        <table class="asiento-line-table">
          <thead><tr><th>Cuenta</th><th>Descripción</th><th style="text-align:right">DEBE</th><th style="text-align:right">HABER</th></tr></thead>
          <tbody>

              <td>${l.cuenta_nombre||''}</td>
              <td class="debe-cell">${l.debe?fmt$(l.debe):'—'}</td>

          </tbody>
          <tfoot><tr style="background:var(--gray-50)">
            <td colspan="2" style="padding:8px 12px;font-weight:700;font-size:12px">TOTALES</td>
            <td class="debe-cell" style="padding:8px 12px">${fmt$(totalDebe)}</td>
            <td class="haber-cell" style="padding:8px 12px">${fmt$(totalHaber)}</td>
          </tfoot>
        </table>
      </div>
    </div>`;
  }).join('');

function eliminarAsiento(id){
  if(!confirm('¿Eliminar este asiento?')) return;
  setAsientos(getAsientos().filter(a=>a.id!==id));
  renderContBody();
}

// ── Plan de Cuentas ───────────────────────────────────────────────────────────
// Prefix ranges per tipo
const PC_PREFIJOS={activo:'1',pasivo:'2',patrimonio:'3',ingreso:'4',gasto:'5'};
const PC_GRUPOS_DEFAULT={activo:'Activo Circulante',pasivo:'Pasivo Circulante',patrimonio:'Patrimonio',ingreso:'Ingresos',gasto:'Gastos Operacionales'};

function siguienteCodigo(tipo){
  const plan=getPlanCuentas();
  const prefijo=PC_PREFIJOS[tipo]||'9';
  // get all codes that start with this prefix, numeric sort
  const existentes=plan
    .map(c=>c.codigo)
    .filter(c=>c.startsWith(prefijo)&&/^\d+$/.test(c))
    .map(Number)
    .sort((a,b)=>a-b);
  if(!existentes.length) return prefijo+'10';
  // find next gap or increment last
  const last=existentes[existentes.length-1];
  return String(last+5); // increment by 5 to leave gaps
}

function htmlPlanCuentas(){
  const plan=getPlanCuentas();
  const tipos={activo:'#15803d',pasivo:'#dc2626',patrimonio:'#7c3aed',ingreso:'#0ea5e9',gasto:'#f97316'};
  const grupos=[...new Set(plan.map(c=>c.grupo||c.tipo))];
  return `
  <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn btn-primary" onclick="modalAgregarCuenta()">+ Nueva cuenta</button>
  </div>
  ${grupos.map(g=>`
    <div class="card" style="margin-bottom:14px">
      <div style="padding:10px 14px;border-bottom:1px solid var(--gray-100);font-size:12px;font-weight:700;color:var(--gray-500);letter-spacing:.5px">${g.toUpperCase()}</div>
      ${plan.filter(c=>(c.grupo||c.tipo)===g).map(c=>`
        <div class="pc-row">
          <span style="font-weight:700;color:var(--primary);width:50px;font-size:13px">${c.codigo}</span>
          <span style="flex:1;font-weight:500;font-size:13px">${c.nombre}</span>
          <span class="pc-tipo-badge" style="background:${tipos[c.tipo]||'#94a3b8'}18;color:${tipos[c.tipo]||'#94a3b8'}">${c.tipo}</span>
          <button onclick="modalEditarCuentaPC('${c.id}')" title="Editar" style="background:none;border:1px solid var(--gray-200);color:var(--gray-500);cursor:pointer;font-size:12px;padding:3px 8px;border-radius:5px;margin-left:8px">✏️</button>
          <button onclick="eliminarCuentaPC('${c.id}')" title="Eliminar" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;margin-left:2px">🗑</button>
        </div>`).join('')}
    </div>`).join('')}`;
}

function _modalFormCuentaPC(title, cod, nom, tipo, grupo, onSave){
  const tipoOpts=['activo','pasivo','patrimonio','ingreso','gasto'];
  showModal(`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:460px">
    <div class="modal-header"><h3>${title}</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group" style="margin-bottom:0;max-width:120px">
          <label>Tipo</label>
          <select id="npc-tipo" onchange="document.getElementById('npc-cod').value=siguienteCodigo(this.value);document.getElementById('npc-grupo').value=PC_GRUPOS_DEFAULT[this.value]||this.value">
            ${tipoOpts.map(t=>`<option value="${t}" ${t===tipo?'selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0;max-width:120px">
          <label>Código <span style="font-size:11px;color:var(--gray-400);font-weight:400">(único)</span></label>
          <input id="npc-cod" value="${cod}" placeholder="Ej: 515" style="font-weight:700;font-size:15px">
        </div>
      </div>
      <div class="form-group">
        <label>Nombre de la cuenta</label>
        <input id="npc-nom" value="${nom}" placeholder="Ej: Seguros">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Grupo <span style="font-size:11px;color:var(--gray-400);font-weight:400">(agrupa en el listado)</span></label>
        <input id="npc-grupo" value="${grupo}" placeholder="Ej: Gastos Operacionales">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="${onSave}">💾 Guardar</button>
    </div>
  </div></div>`);
}

function modalAgregarCuenta(){
  const tipoDefault='gasto';
  const codSugerido=siguienteCodigo(tipoDefault);
  _modalFormCuentaPC('+ Nueva Cuenta Contable', codSugerido, '', tipoDefault, PC_GRUPOS_DEFAULT[tipoDefault], 'guardarCuentaPC()');
}

function modalEditarCuentaPC(id){
  const c=getPlanCuentas().find(p=>p.id===id);
  if(!c) return;
  _modalFormCuentaPC('✏️ Editar Cuenta', c.codigo, c.nombre, c.tipo, c.grupo||PC_GRUPOS_DEFAULT[c.tipo]||c.tipo, `actualizarCuentaPC('${id}')`);
}

function guardarCuentaPC(){
  const cod=(document.getElementById('npc-cod')?.value||'').trim();
  const nom=(document.getElementById('npc-nom')?.value||'').trim();
  const tipo=document.getElementById('npc-tipo')?.value||'gasto';
  const grupo=(document.getElementById('npc-grupo')?.value||PC_GRUPOS_DEFAULT[tipo]||tipo).trim();
  if(!cod||!nom){ toast('Completa código y nombre','error'); return; }
  const plan=getPlanCuentas();
  if(plan.find(c=>c.codigo===cod)){ toast('Ese código ya existe','error'); return; }
  plan.push({id:'pc-'+uid(),codigo:cod,nombre:nom,tipo,grupo});
  plan.sort((a,b)=>+a.codigo-(+b.codigo)||a.codigo.localeCompare(b.codigo));
  setPlanCuentas(plan); closeModal(); toast('Cuenta agregada ✓'); renderContBody();
}

function actualizarCuentaPC(id){
  const cod=(document.getElementById('npc-cod')?.value||'').trim();
  const nom=(document.getElementById('npc-nom')?.value||'').trim();
  const tipo=document.getElementById('npc-tipo')?.value||'gasto';
  const grupo=(document.getElementById('npc-grupo')?.value||PC_GRUPOS_DEFAULT[tipo]||tipo).trim();
  if(!cod||!nom){ toast('Completa código y nombre','error'); return; }
  const plan=getPlanCuentas();
  const dup=plan.find(c=>c.codigo===cod&&c.id!==id);
  if(dup){ toast('Ese código ya lo usa otra cuenta','error'); return; }
  const i=plan.findIndex(c=>c.id===id);
  if(i<0) return;
  plan[i]={...plan[i],codigo:cod,nombre:nom,tipo,grupo};
  plan.sort((a,b)=>+a.codigo-(+b.codigo)||a.codigo.localeCompare(b.codigo));
  setPlanCuentas(plan); closeModal(); toast('Cuenta actualizada ✓'); renderContBody();
}

function eliminarCuentaPC(id){
  if(!confirm('¿Eliminar esta cuenta?')) return;
  setPlanCuentas(getPlanCuentas().filter(c=>c.id!==id));
  renderContBody();
}

// ── Mapeo Categorías → Cuentas ────────────────────────────────────────────────
function htmlMapaCategorias(){
  const cats=getGastoCats();
  const map=getCatCuentaMap();
  const plan=getPlanCuentas().filter(c=>c.tipo==='gasto');
  return `<div class="card">
    <div style="padding:14px 16px;border-bottom:1px solid var(--gray-100)">
      <h3 style="margin:0;font-size:14px">Categoría de Gasto → Cuenta Contable</h3>
      <p style="margin:4px 0 0;font-size:12px;color:var(--gray-400)">Define a qué cuenta se carga cada categoría al registrar un gasto</p>
    </div>
    <div style="padding:8px 0">
      ${cats.map(c=>{
        const cuentaId=map[c.nombre]||'pc-595';
        return `<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--gray-100)">
          <span style="min-width:120px;font-weight:500">${c.icono||''} ${c.nombre}</span>
          <span style="color:var(--gray-400);font-size:18px">→</span>
          <select onchange="guardarMapaCuenta('${c.nombre.replace(/'/g,"\\'")}',this.value)" style="flex:1;font-size:13px">
            ${plan.map(p=>`<option value="${p.id}" ${p.id===cuentaId?'selected':''}>${p.codigo} — ${p.nombre}</option>`).join('')}
          </select>
        </div>`;
      }).join('')}
    </div>
    <div style="padding:12px 16px;background:var(--gray-50);font-size:12px;color:var(--gray-400)">
      💡 También puedes crear nuevas cuentas en el Plan de Cuentas y asignarlas aquí
    </div>
  </div>`;
}

function guardarMapaCuenta(catNombre, cuentaId){
  const map=getCatCuentaMap();
  map[catNombre]=cuentaId;
  setCatCuentaMap(map);
  toast('Mapeo actualizado');
}

// ── Asiento Manual ────────────────────────────────────────────────────────────
function modalAsientoManual(){
  const plan=getPlanCuentas();
  const opts=plan.map(c=>`<option value="${c.id}" data-codigo="${c.codigo}">${c.codigo} — ${c.nombre}</option>`).join('');
  showModal(`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal modal-lg">
    <div class="modal-header"><h3>✏️ Asiento Manual</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-group" style="margin-bottom:0"><label>Descripción</label><input id="am-desc" placeholder="Ej: Asiento de apertura"></div>
        <div class="form-group" style="margin-bottom:0"><label>Fecha</label><input type="date" id="am-fecha" value="${today()}" onclick="this.showPicker()" style="cursor:pointer"></div>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--gray-50)">
          <th style="padding:8px 10px;font-size:11px;color:var(--gray-500);font-weight:600;text-align:left;border-bottom:1px solid var(--gray-200)">CUENTA</th>
          <th style="padding:8px 10px;font-size:11px;color:var(--gray-500);font-weight:600;text-align:right;border-bottom:1px solid var(--gray-200);width:130px">DEBE</th>
          <th style="padding:8px 10px;font-size:11px;color:var(--gray-500);font-weight:600;text-align:right;border-bottom:1px solid var(--gray-200);width:130px">HABER</th>
          <th style="width:36px;border-bottom:1px solid var(--gray-200)"></th>
        </tr></thead>
        <tbody id="am-lineas">
          ${[0,1].map(i=>`<tr id="am-row-${i}">
            <td style="padding:5px 8px"><select id="am-cuenta-${i}" style="width:100%">${opts}</select></td>
            <td style="padding:5px 8px"><input type="number" id="am-debe-${i}" placeholder="0" min="0" style="width:100%;text-align:right" oninput="recalcAM()"></td>
            <td style="padding:5px 8px"><input type="number" id="am-haber-${i}" placeholder="0" min="0" style="width:100%;text-align:right" oninput="recalcAM()"></td>
            <td style="padding:5px 4px;text-align:center"><button onclick="quitarLineaAM(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px">×</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <button class="btn btn-sm btn-outline" onclick="agregarLineaAM()">+ Línea</button>
        <div id="am-balance" style="font-size:13px;font-weight:600;color:var(--gray-500)">DEBE $0 = HABER $0</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarAsientoManual()">💾 Guardar asiento</button>
    </div>
  </div></div>`);
  _amRows=2;
}
let _amRows=2;
function agregarLineaAM(){
  const i=_amRows++;
  const plan=getPlanCuentas();
  const opts=plan.map(c=>`<option value="${c.id}">${c.codigo} — ${c.nombre}</option>`).join('');
  document.getElementById('am-lineas').insertAdjacentHTML('beforeend',`<tr id="am-row-${i}">
    <td style="padding:5px 8px"><select id="am-cuenta-${i}" style="width:100%">${opts}</select></td>
    <td style="padding:5px 8px"><input type="number" id="am-debe-${i}" placeholder="0" min="0" style="width:100%;text-align:right" oninput="recalcAM()"></td>
    <td style="padding:5px 8px"><input type="number" id="am-haber-${i}" placeholder="0" min="0" style="width:100%;text-align:right" oninput="recalcAM()"></td>
    <td style="padding:5px 4px;text-align:center"><button onclick="quitarLineaAM(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px">×</button></td>
  </tr>`);
}
function quitarLineaAM(i){ document.getElementById('am-row-'+i)?.remove(); recalcAM(); }
function recalcAM(){
  let d=0,h=0;
  for(let i=0;i<_amRows;i++){
    d+=+(document.getElementById('am-debe-'+i)?.value||0);
    h+=+(document.getElementById('am-haber-'+i)?.value||0);
  }
  const el=document.getElementById('am-balance');
  if(el){ const ok=Math.abs(d-h)<0.01; el.innerHTML=`DEBE ${fmt$(d)} ${ok?'=':'≠'} HABER ${fmt$(h)}`; el.style.color=ok?'#15803d':'#dc2626'; }
}
function guardarAsientoManual(){
  const desc=(document.getElementById('am-desc')?.value||'').trim();
  const fecha=document.getElementById('am-fecha')?.value||today();
  if(!desc){ toast('Ingresa una descripción','error'); return; }
  const plan=getPlanCuentas();
  const lineas=[];
  for(let i=0;i<_amRows;i++){
    const sel=document.getElementById('am-cuenta-'+i);
    if(!sel) continue;
    const debe=+(document.getElementById('am-debe-'+i)?.value||0);
    const haber=+(document.getElementById('am-haber-'+i)?.value||0);
    if(!debe&&!haber) continue;
    const c=plan.find(p=>p.id===sel.value)||{id:sel.value,codigo:'???',nombre:'?'};
    lineas.push({cuenta_id:c.id,cuenta_codigo:c.codigo,cuenta_nombre:c.nombre,debe,haber});
  }
  if(lineas.length<2){ toast('Agrega al menos 2 líneas','error'); return; }
  const totD=lineas.reduce((s,l)=>s+l.debe,0), totH=lineas.reduce((s,l)=>s+l.haber,0);
  if(Math.abs(totD-totH)>0.01){ toast('El asiento no cuadra (DEBE ≠ HABER)','error'); return; }
  crearAsiento({id:'as-m-'+uid(),fecha,descripcion:desc,ref_tipo:'manual',ref_id:'',lineas});
  closeModal(); toast('Asiento guardado'); _contTab='diario'; renderContBody();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
nav('dashboard');
</script>
