<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Módulo de Compras ERP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;--primary-mid:#bfdbfe;
  --success:#16a34a;--success-light:#f0fdf4;--warning:#d97706;--warning-light:#fffbeb;
  --danger:#dc2626;--danger-light:#fef2f2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;
  --gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;
  --gray-800:#1f2937;--gray-900:#111827;
  --sidebar-w:240px;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-50);color:var(--gray-800);display:flex;min-height:100vh;font-size:14px}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);background:#1e3a5f;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar-logo{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo h1{font-size:17px;font-weight:700;color:#fff}
.sidebar-logo p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.nav-section{padding:16px 16px 4px;font-size:10px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.4);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:rgba(255,255,255,.75);border-radius:6px;margin:1px 8px;transition:all .15s;font-size:13.5px}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:var(--primary);color:#fff;font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.35)}

/* MAIN */
#main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
#topbar h2{font-size:17px;font-weight:600;color:var(--gray-800)}
#topbar-actions{display:flex;gap:8px;align-items:center}
#page-content{padding:24px;flex:1}

/* CARDS & LAYOUT */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--primary)}
.kpi-card.green{border-left-color:var(--success)}.kpi-card.orange{border-left-color:var(--warning)}.kpi-card.red{border-left-color:var(--danger)}
.kpi-label{font-size:12px;color:var(--gray-500);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:700;color:var(--gray-800)}
.kpi-sub{font-size:12px;color:var(--gray-400);margin-top:4px}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:15px;font-weight:600;color:var(--gray-800)}
.card-body{padding:20px}

/* TABLES */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11.5px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--gray-200);background:var(--gray-50)}
td{padding:11px 14px;border-bottom:1px solid var(--gray-100);vertical-align:middle;font-size:13.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}
.table-empty{text-align:center;color:var(--gray-400);padding:40px;font-style:italic}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-200)}.btn-secondary:hover{background:var(--gray-200)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-warning{background:var(--warning);color:#fff}.btn-warning:hover{background:#b45309}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}.btn-outline:hover{background:var(--primary-light)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-icon{padding:7px 8px;border-radius:7px;background:var(--gray-100);color:var(--gray-600);border:none;cursor:pointer;font-size:15px;transition:all .15s}.btn-icon:hover{background:var(--gray-200)}

/* FORMS */
.form-group{margin-bottom:16px}
.form-row{display:grid;gap:12px;grid-template-columns:1fr 1fr;margin-bottom:0}
.form-row-3{display:grid;gap:12px;grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:12.5px;font-weight:600;color:var(--gray-600);margin-bottom:5px}
input,select,textarea{width:100%;padding:8px 11px;border:1.5px solid var(--gray-300);border-radius:7px;font-size:13.5px;background:#fff;color:var(--gray-800);transition:border .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:80px}
select{cursor:pointer}

/* BADGES / STATUS */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600;letter-spacing:.02em}
.badge-blue{background:var(--primary-light);color:var(--primary)}
.badge-green{background:var(--success-light);color:var(--success)}
.badge-orange{background:var(--warning-light);color:var(--warning)}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-gray{background:var(--gray-100);color:var(--gray-500)}

/* OC PROGRESS */
.oc-progress{display:flex;align-items:center;margin:20px 0}
.oc-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.oc-step-circle{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--gray-300);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gray-400);z-index:1}
.oc-step.done .oc-step-circle{background:var(--success);border-color:var(--success);color:#fff}
.oc-step.active .oc-step-circle{background:var(--primary);border-color:var(--primary);color:#fff}
.oc-step.cancelled .oc-step-circle{background:var(--danger);border-color:var(--danger);color:#fff}
.oc-step-line{position:absolute;top:15px;left:calc(50% + 16px);right:calc(-50% + 16px);height:2px;background:var(--gray-200);z-index:0}
.oc-step.done .oc-step-line{background:var(--success)}
.oc-step-label{font-size:11px;color:var(--gray-500);margin-top:6px;text-align:center;font-weight:500}
.oc-step.active .oc-step-label{color:var(--primary);font-weight:700}
.oc-step.done .oc-step-label{color:var(--success)}

/* GASTOS */
.gasto-rapido-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.gasto-rapido-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 14px;border-radius:12px;border:2px solid var(--gray-200);background:#fff;cursor:pointer;transition:all .15s;min-width:68px;font-size:11px;font-weight:600;color:var(--gray-600)}
.gasto-rapido-btn .gr-icon{font-size:22px;line-height:1}
.gasto-rapido-btn:hover{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.gasto-rapido-btn.sel{border-color:var(--primary);background:var(--primary);color:#fff}
.quick-add-bar{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:end;background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:12px;padding:16px 18px;margin-bottom:20px}
.quick-add-bar input,select{margin:0}
.metodo-chips{display:flex;flex-wrap:wrap;gap:6px}
.metodo-chip{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--gray-200);color:var(--gray-600);background:#fff;transition:all .15s}
.metodo-chip.sel{background:var(--primary);border-color:var(--primary);color:#fff}
.gasto-row-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600}
.gasto-filtros{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.gasto-filtro-chip{padding:4px 12px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--gray-200);color:var(--gray-600);background:#fff;transition:all .15s}
.gasto-filtro-chip.sel{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}

/* CONTABILIDAD */
.cont-tabs{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:20px}
.cont-tab{padding:10px 20px;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.cont-tab:hover{color:var(--primary)}
.cont-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.asiento-card{border:1px solid var(--gray-200);border-radius:10px;margin-bottom:12px;overflow:hidden}
.asiento-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gray-50);cursor:pointer;user-select:none}
.asiento-header:hover{background:var(--gray-100)}
.asiento-num{font-size:11px;font-weight:700;color:var(--primary);background:var(--primary-light);padding:2px 8px;border-radius:99px}
.asiento-body{display:none;padding:0}
.asiento-body.open{display:block}
.asiento-line-table{width:100%;border-collapse:collapse}
.asiento-line-table th{padding:7px 12px;font-size:11px;font-weight:600;color:var(--gray-500);background:var(--gray-50);border-bottom:1px solid var(--gray-200);text-align:left}
.asiento-line-table td{padding:8px 12px;font-size:13px;border-bottom:1px solid var(--gray-100)}
.debe-cell{color:#10b981;font-weight:700;text-align:right}
.haber-cell{color:#ef4444;font-weight:700;text-align:right}
.er-seccion{margin-bottom:24px}
.er-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-radius:6px;font-size:13px}
.er-row:hover{background:var(--gray-50)}
.er-row.subtotal{font-weight:700;border-top:1px solid var(--gray-200);margin-top:4px;background:var(--gray-50)}
.er-row.resultado{font-weight:800;font-size:15px;padding:12px 14px;border-radius:8px;margin-top:8px}
.er-row.positivo{background:#dcfce7;color:#15803d}
.er-row.negativo{background:#fee2e2;color:#dc2626}
.pc-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;font-size:13px}
.pc-row:hover{background:var(--gray-50)}
.pc-tipo-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap}

/* cat management */
.cat-mgmt-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray-100)}
.cat-mgmt-row:last-child{border-bottom:none}
.cat-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.cat-color-pick{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.cat-color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s}
.cat-color-swatch.sel{border-color:var(--gray-800);transform:scale(1.15)}
/* desc autocomplete */
.desc-dropdown{position:fixed;background:#fff;border:1.5px solid var(--primary);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:9999;max-height:200px;overflow-y:auto;display:none;min-width:220px}
.desc-drop-item{padding:9px 14px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.desc-drop-item:hover{background:var(--primary-light)}
.desc-drop-item .di-name{font-weight:500;color:var(--gray-800)}
.desc-drop-item .di-cat{font-size:11px;padding:2px 8px;border-radius:99px;white-space:nowrap}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-lg{max-width:860px}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:700;color:var(--gray-800)}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--gray-100);display:flex;gap:8px;justify-content:flex-end}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400);line-height:1;padding:2px 6px;border-radius:5px}.close-btn:hover{background:var(--gray-100);color:var(--gray-700)}

/* IMPORT EXCEL */
.drop-zone{border:2.5px dashed var(--gray-300);border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;background:var(--gray-50)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.drop-zone-icon{font-size:36px;margin-bottom:8px}
.drop-zone p{color:var(--gray-500);font-size:13.5px}
.drop-zone strong{color:var(--primary);cursor:pointer}
.import-preview{overflow-x:auto;max-height:380px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:8px;margin-top:14px}
.import-preview th{position:sticky;top:0;z-index:2}
.import-preview input{border:1px solid var(--gray-200);padding:5px 8px;border-radius:5px;font-size:12.5px}
.import-preview input:focus{border-color:var(--primary)}
.import-row-del{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:16px;padding:3px 6px;border-radius:4px}.import-row-del:hover{background:var(--danger-light);color:var(--danger)}
.template-info{background:var(--primary-light);border:1px solid var(--primary-mid);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--primary-dark)}


/* FILTER TABS */
.filter-tabs{display:flex;gap:2px;border-bottom:2px solid var(--gray-200);margin-bottom:0;padding:0 20px}
.filter-tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--gray-500);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.filter-tab:hover{color:var(--gray-700)}
.filter-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab-count{display:inline-flex;align-items:center;justify-content:center;background:var(--gray-100);color:var(--gray-500);font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;padding:0 5px;margin-left:5px}
.filter-tab.active .tab-count{background:var(--primary-light);color:var(--primary)}
.badge-mult{background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer}

/* EMPTY STATE */
.empty-state{text-align:center;padding:56px 24px;color:var(--gray-400)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:600;color:var(--gray-600);margin-bottom:6px}
.empty-state p{font-size:13.5px;max-width:320px;margin:0 auto 16px}

/* SEARCH */
.search-bar{position:relative;display:inline-block}
.search-bar input{padding-left:32px;border-radius:7px;min-width:200px}
.search-bar::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px}

/* ALERT */
.alert{padding:12px 16px;border-radius:8px;font-size:13.5px;margin-bottom:14px}
.alert-warning{background:var(--warning-light);color:#92400e;border:1px solid #fde68a}
.alert-success{background:var(--success-light);color:#14532d;border:1px solid #bbf7d0}
.alert-info{background:var(--primary-light);color:var(--primary-dark);border:1px solid var(--primary-mid)}

/* DIVIDER */
.divider{height:1px;background:var(--gray-100);margin:16px 0}


/* PRODUCT AUTOCOMPLETE */
.lbl-item{display:block;font-size:11px;color:var(--gray-500);font-weight:600;margin-bottom:4px}
.prod-search-wrap{position:relative}
.prod-dropdown{position:fixed;background:#fff;border:1.5px solid var(--primary);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.08);z-index:9999;max-height:240px;overflow-y:auto;display:none;min-width:200px;-webkit-overflow-scrolling:touch}
.prod-drop-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;cursor:pointer;font-size:13px;gap:8px;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;user-select:none}
.prod-drop-item:hover,.prod-drop-item.focused{background:var(--primary-light)}
.prod-drop-item .prod-name{font-weight:500;color:var(--gray-800)}
.prod-drop-item .prod-price{font-size:12px;color:var(--gray-400);white-space:nowrap}
.prod-drop-item .prod-unit{font-size:11px;background:var(--gray-100);color:var(--gray-500);padding:1px 6px;border-radius:4px}
.oc-item-row-wrap{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:12px;margin-bottom:10px}
.oc-item-row-wrap:hover{border-color:var(--primary-mid)}

/* RESPONSIVE */
@media(max-width:768px){
  :root{--sidebar-w:0px}
  #sidebar{display:none}
  #page-content{padding:16px}
}

/* DETAIL SECTIONS */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.detail-label{font-size:11.5px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.detail-value{font-size:14.5px;color:var(--gray-800);font-weight:500}
.section-title{font-size:13px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sidebar-logo">
    <h1>🛒 ERP Compras</h1>
    <p>Módulo de Abastecimiento</p>
  </div>
  <div class="nav-section">Principal</div>
  <div class="nav-item active" id="nav-dashboard" onclick="nav('dashboard')"><span class="icon">📊</span> Dashboard</div>
  <div class="nav-section">Operaciones</div>
  <div class="nav-item" id="nav-ventas" onclick="nav('ventas')"><span class="icon">🛒</span> Ventas</div>
  <div class="nav-item" id="nav-clientes" onclick="nav('clientes')"><span class="icon">👥</span> Clientes</div>
  <div class="nav-item" id="nav-oc" onclick="nav('oc')"><span class="icon">📋</span> Órdenes de Compra</div>
  <div class="nav-item" id="nav-gastos" onclick="nav('gastos')"><span class="icon">💳</span> Gastos</div>
  <div class="nav-section">Maestros</div>
  <div class="nav-item" id="nav-proveedores" onclick="nav('proveedores')"><span class="icon">🏢</span> Proveedores</div>
  <div class="nav-item" id="nav-productos" onclick="nav('productos')"><span class="icon">📦</span> Productos</div>
  <div class="nav-item" id="nav-kits" onclick="nav('kits')"><span class="icon">🔧</span> Kits / Equipos</div>
  <div class="nav-item" id="nav-bodegas" onclick="nav('bodegas')"><span class="icon">🏭</span> Bodegas / Sucursales</div>
  <div class="nav-section">Análisis</div>
  <div class="nav-item" id="nav-estadisticas" onclick="nav('estadisticas')"><span class="icon">📈</span> Estadísticas</div>
  <div style="border-top:1px solid rgba(255,255,255,.1);margin:8px 16px"></div>
  <div class="nav-item" id="nav-contabilidad" onclick="nav('contabilidad')"><span class="icon">📒</span> Contabilidad</div>
  <div class="sidebar-footer">v2.0 · datos locales</div>
</nav>

<div id="main">
  <div id="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div id="topbar-actions"></div>
  </div>
  <div id="page-content"></div>
</div>

<!-- ======================== MODALS ======================== -->
<div id="modal-container"></div>

<script>
// ─────────────────────────────────────────────
// DB HELPER
// ─────────────────────────────────────────────
const DB = {
  prefix: 'erp_',
  get(k){ try{ return JSON.parse(localStorage.getItem(this.prefix+k)) }catch(e){ return null } },
  set(k,v){ localStorage.setItem(this.prefix+k, JSON.stringify(v)) },
  getCfg(){ return this.get('cfg') || {ocCounter:0} },
  setCfg(v){ this.set('cfg',v) },
  nextOC(){ const c=this.getCfg(); c.ocCounter=(c.ocCounter||0)+1; this.setCfg(c); return c.ocCounter },

function getCantRecibida(oc, itemId){
  return (oc.recepciones||[]).reduce((s,r)=>{
    const ri=(r.items||[]).find(i=>i.prod_item_id===itemId);
    return s+(ri?ri.cantidad:0);
  },0);
}
function calcularEstadoOC(oc){
  if(oc.estado==='cancelada') return 'cancelada';
  if(oc.estado==='confirmada') return 'confirmada';
  const items=oc.items||[];
  if(!items.length) return 'borrador';
  if(!(oc.recepciones||[]).length) return 'borrador';
  let totalOrd=0,totalRec=0;
  items.forEach(it=>{ totalOrd+=it.cantidad; totalRec+=getCantRecibida(oc,it.id); });
  if(totalRec===0) return 'borrador';
  if(totalRec<totalOrd) return 'parcial';
  return 'recibida';
}

function selectVtaProduct(itemId,prodId,nombre,precio){
  document.getElementById('vta-prodid-'+itemId).value=prodId;

  document.getElementById('vta-pn-'+itemId).value=pn||precio||0;
  document.getElementById('vta-pi-'+itemId).value=precio||0;

function onVtaChangeNeto(id){
  const neto=+(document.getElementById('vta-pn-'+id)?.value)||0;
  const piEl=document.getElementById('vta-pi-'+id);
  if(piEl) piEl.value=Math.round(neto*(1+IVA));
  calcVtaItem(id);
}
function onVtaChangeIva(id){
  const piva=+(document.getElementById('vta-pi-'+id)?.value)||0;
  const pnEl=document.getElementById('vta-pn-'+id);
  if(pnEl) pnEl.value=Math.round(piva/(1+IVA));
  calcVtaItem(id);
}
function calcVtaItem(id){
  const qty=+(document.getElementById('vta-qty-'+id)?.value)||1;
  const pn=+(document.getElementById('vta-pn-'+id)?.value)||0;
  const sub=qty*pn;
  const subEl=document.getElementById('vta-sub-'+id);
  if(subEl) subEl.value=fmt$(sub);
  calcVtaTotal();
}
function calcVtaTotal(){
  let neto=0;
  document.querySelectorAll('[id^="vta-qty-"]').forEach(el=>{
    const id=el.id.replace('vta-qty-','');
    neto+=(+(el.value)||1)*(+(document.getElementById('vta-pn-'+id)?.value)||0);
  });
  const iva=Math.round(neto*IVA);
  const total=neto+iva;
  const n=document.getElementById('vta-total-neto'); if(n) n.textContent=fmt$(neto);
  const iv=document.getElementById('vta-total-iva-val'); if(iv) iv.textContent=fmt$(iva);
  const t=document.getElementById('vta-total-final'); if(t) t.textContent=fmt$(total);
}

function saveVenta(){
  const fecha=document.getElementById('vta-fecha')?.value;
  const cliente=(document.getElementById('vta-cliente')?.value||'').trim();
  const metodo=window._vtaPago||'transferencia';
  const items=[];
  document.querySelectorAll('[id^="vta-qty-"]').forEach(el=>{
    const id=el.id.replace('vta-qty-','');
    const nombre=(document.getElementById('vta-prod-'+id)?.value||'').trim();
    const prodId=document.getElementById('vta-prodid-'+id)?.value||'';
    const qty=+el.value||1;
    const pn=+(document.getElementById('vta-pn-'+id)?.value)||0;
    const pi=+(document.getElementById('vta-pi-'+id)?.value)||Math.round(pn*1.19);
    if(nombre) items.push({id,producto_id:prodId,producto_nombre:nombre,cantidad:qty,precio_neto:pn,precio_iva:pi,subtotal:qty*pn});
  });
  if(!fecha){ toast('Ingresa una fecha','error'); return; }
  if(!items.length){ toast('Agrega al menos un producto','error'); return; }
  const total=items.reduce((s,i)=>s+i.subtotal,0);
  const total_iva=Math.round(total*(1+IVA));
  // Descontar stock
  const stock=DB.get('stock')||{};
  items.forEach(it=>{
    if(!it.producto_id) return;
    // find default bodega key or any existing key
    const keys=Object.keys(stock).filter(k=>k.startsWith(it.producto_id+'_'));
    if(keys.length){ stock[keys[0]]=Math.max(0,(stock[keys[0]]||0)-it.cantidad); }
  });
  DB.set('stock',stock);
  const venta={id:uid(),numero:'VTA-'+String(DB.nextVenta()).padStart(5,'0'),estado:'pagada',
    fecha,cliente,metodo_pago:metodo,items,total,total_iva,fecha_creacion:today()};
  const ventas=getVentas(); ventas.push(venta); setVentas(ventas);
  crearAsientoVenta(venta);
  closeModal(); toast(`Venta ${venta.numero} registrada ✓`,'success'); renderVentas();
}

function anularVentaConfirm(id){
  const v=getVentas().find(x=>x.id===id);
  if(!v||!confirm(`¿Anular la venta ${v.numero}? Se registrará en el historial.`)) return;
  const ventas=getVentas();
  const i=ventas.findIndex(x=>x.id===id);
  if(i<0) return;
  // Reverse stock
  const stock=DB.get('stock')||{};
  (ventas[i].items||[]).forEach(it=>{
    if(!it.producto_id) return;
    const keys=Object.keys(stock).filter(k=>k.startsWith(it.producto_id+'_'));
    if(keys.length) stock[keys[0]]=(stock[keys[0]]||0)+it.cantidad;
  });
  DB.set('stock',stock);
  ventas[i].estado='anulada'; ventas[i].fecha_anulacion=today();
  setVentas(ventas);
  // Reverse accounting entry
  crearAsientoAnulacionVenta(ventas[i]);
  toast(`Venta ${ventas[i].numero} anulada`); renderVentas();
}

function formatRUT(v){
  v=v.replace(/[^0-9kK]/g,'').toUpperCase();
  if(v.length<2) return v;
  const dv=v.slice(-1);
  let num=v.slice(0,-1);
  num=num.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return num+'-'+dv;
}
function onRUTInput(inp){
  const pos=inp.selectionStart;
  const raw=inp.value.replace(/[^0-9kK]/g,'').toUpperCase();
  inp.value=raw?formatRUT(raw):'';
}
function autoCapNombre(inp){
  const words=inp.value.split(' ');
  inp.value=words.map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}

  </tr>`;

  setTimeout(()=>document.getElementById('kcomp-nom-'+i)?.focus(),30);

function removeKCompRow(i){
  document.getElementById('kcomp-row-'+i)?.remove();
}

function posicionarEnlaceDrop(){
  const inp=document.getElementById('kit-enlace-search');
  const drop=document.getElementById('kit-enlace-results');
  if(!inp||!drop) return;
  const rect=inp.getBoundingClientRect();
  const vpH=window.innerHeight||document.documentElement.clientHeight;
  const maxH=Math.min(340, vpH-rect.bottom-12);
  drop.style.top=(rect.bottom+6)+'px';
  drop.style.left=rect.left+'px';
  drop.style.width=rect.width+'px';
  drop.style.maxHeight=maxH+'px';
}

function filtrarEnlaceKits(q){
  const resultsEl=document.getElementById('kit-enlace-results');
  if(!resultsEl) return;
  const gruposRaw=getProductos().map(p=>p.enlace&&p.enlace.trim()).filter(Boolean); const grupos=[...new Map(gruposRaw.map(g=>[g.toLowerCase(),g])).values()].sort();
  if(!q.trim()){
    // Show all when box is focused but empty
    if(document.activeElement===document.getElementById('kit-enlace-search')){
      const html=grupos.map(g=>{
        const cnt=getProductos().filter(p=>p.enlace&&p.enlace.trim().toLowerCase()===g.trim().toLowerCase()).length;
        return `<div onmousedown="aplicarEnlaceKit(${JSON.stringify(g)})" ontouchstart="aplicarEnlaceKit(${JSON.stringify(g)})"
          style="padding:14px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid #f3f0ff;display:flex;align-items:center;gap:10px;touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,0)"
          onmouseover="this.style.background='#f5f3ff'" onmouseout="this.style.background='white'">
          <span style="color:#7c3aed;font-size:16px">🔗</span>
          <span style="font-weight:600;color:var(--gray-700);font-size:14px">${g}</span>
          <span style="margin-left:auto;font-size:12px;color:#7c3aed;font-weight:600;background:#ede9fe;padding:2px 10px;border-radius:10px">${cnt} componentes</span>
        </div>`;}).join('');
      resultsEl.style.display='block';
    } else {
      resultsEl.style.display='none';
    }
    return;
  }
  const filtered=grupos.filter(g=>g.toLowerCase().includes(q.toLowerCase()));
  if(!filtered.length){
    resultsEl.innerHTML='<div style="padding:12px;font-size:13px;color:var(--gray-400)">Sin resultados para "'+q+'"</div>';
    resultsEl.style.display='block';
    return;
  }
  const hl=(txt)=>txt.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<strong style="color:#7c3aed">$1</strong>');
  resultsEl.innerHTML=filtered.map(g=>{
    const cnt=getProductos().filter(p=>p.enlace&&p.enlace.trim().toLowerCase()===g.trim().toLowerCase()).length;
    return `<div onmousedown="aplicarEnlaceKit(${JSON.stringify(g)})" ontouchstart="aplicarEnlaceKit(${JSON.stringify(g)})"
      style="padding:14px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid #f3f0ff;display:flex;align-items:center;gap:10px;touch-action:manipulation;-webkit-tap-highlight-color:rgba(0,0,0,0)"
      onmouseover="this.style.background='#f5f3ff'" onmouseout="this.style.background='white'">
      <span style="color:#7c3aed;font-size:16px">🔗</span>
      <span style="font-weight:600;color:var(--gray-700);font-size:14px">${hl(g)}</span>
      <span style="margin-left:auto;font-size:12px;color:#7c3aed;font-weight:600;background:#ede9fe;padding:2px 10px;border-radius:10px">${cnt} componentes</span>
    </div>`;}).join('');
}

function aplicarEnlaceKit(enlace){
  if(!enlace) return;
  enlace=enlace.trim();
  // Case-insensitive + trim match so small differences don't break the lookup
  const el=enlace.toLowerCase();
  const prods=getProductos().filter(p=>p.enlace&&p.enlace.trim().toLowerCase()===el);
  if(!prods.length){ toast('No hay productos con el Enlace "'+enlace+'"','error'); return; }
  const kitNombreEl=document.getElementById('kit-nombre');
  if(kitNombreEl&&!kitNombreEl.value.trim()) kitNombreEl.value=enlace;
  const searchEl=document.getElementById('kit-enlace-search');
  if(searchEl) searchEl.value=enlace;
  const resultsEl=document.getElementById('kit-enlace-results');
  if(resultsEl) resultsEl.style.display='none';
  const tbody=document.getElementById('kcomp-body');
  if(!tbody) return;
  tbody.innerHTML='';
  window._kCompCount=0;
  prods.forEach(p=>{
    const i=window._kCompCount++;
    const nombre=(p.nombre||'').replace(/"/g,'&quot;');
    tbody.insertAdjacentHTML('beforeend',`<tr id="kcomp-row-${i}">
      <td style="padding:5px 8px"><input type="text" id="kcomp-nom-${i}" value="${nombre}" placeholder="Nombre del componente..." style="width:100%" oninput="autoCapNombre(this)"></td>
      <td style="padding:5px 4px"><input type="number" id="kcomp-qty-${i}" value="1" min="1" style="width:60px;text-align:center"></td>
      <td style="padding:5px 4px"><button onclick="removeKCompRow(${i})" style="background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:18px">×</button></td>
    </tr>`);
  });
  toast('✅ '+prods.length+' componentes cargados desde "'+enlace+'"','success');
}

function saveKit(editId){
  const nombre=(document.getElementById('kit-nombre')?.value||'').trim();
  const categoria=(document.getElementById('kit-cat')?.value||'').trim();
  if(!nombre){ toast('El nombre es obligatorio','error'); return; }
  const componentes=[];
  document.querySelectorAll('[id^="kcomp-nom-"]').forEach(el=>{
    const i=el.id.replace('kcomp-nom-','');
    const n=el.value.trim();
    const qty=+(document.getElementById('kcomp-qty-'+i)?.value)||1;
    if(n) componentes.push({id:uid(),nombre:n,cantidad:qty});
  });
  if(!componentes.length){ toast('Agrega al menos un componente','error'); return; }
  const kits=getKits();
  if(editId){
    const i=kits.findIndex(k=>k.id===editId);
    if(i>=0) Object.assign(kits[i],{nombre,categoria,componentes});
    setKits(kits); closeModal(); toast('Kit actualizado'); renderKits();
  } else {
    kits.push({id:uid(),nombre,categoria,componentes,fecha_creacion:today()});
    setKits(kits); closeModal(); toast(`Kit "${nombre}" creado con ${componentes.length} componentes ✓`,'success'); renderKits();
  }
}

function clonarKit(id){
  const k=getKits().find(x=>x.id===id);
  if(!k) return;
  const nombre=prompt(`Nombre del nuevo kit (clon de "${k.nombre}"):`,k.nombre+' (copia)');
  if(!nombre||!nombre.trim()) return;
  const kits=getKits();
  kits.push({id:uid(),nombre:nombre.trim(),categoria:k.categoria,
    componentes:(k.componentes||[]).map(c=>({...c,id:uid()})),
    fecha_creacion:today()});
  setKits(kits); toast(`Kit "${nombre.trim()}" clonado ✓`,'success'); renderKits();
}

function eliminarKitConfirm(id){
  const k=getKits().find(x=>x.id===id);
  if(!k||!confirm(`¿Eliminar el kit "${k.nombre}"?`)) return;
  setKits(getKits().filter(x=>x.id!==id));
  toast('Kit eliminado'); renderKits();
}

function handleKitExcelDrop(e){
  e.preventDefault();
  document.getElementById('kit-import-drop').classList.remove('drag-over');
  const file=e.dataTransfer.files[0]; if(file) handleKitExcelFile(file);
}

function handleKitExcelFile(file){
  if(!file) return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=function(ev){
    let rows=[];
    if(ext==='csv'){
      rows=ev.target.result.split('\n').filter(l=>l.trim()).map(l=>l.split(',').map(c=>c.replace(/^"|"$/g,'').trim()));
    } else {
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array'});
      rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
    }
    parseKitExcel(rows);
  };
  if(ext==='csv') reader.readAsText(file); else reader.readAsArrayBuffer(file);
}

function parseKitExcel(rows){
  if(!rows.length){ toast('Archivo vacío','error'); return; }
  const first=(rows[0]||[]).map(c=>String(c).toLowerCase());
  const hasHeader=first.some(c=>c.includes('modelo')||c.includes('componente'));
  const dataRows=hasHeader?rows.slice(1):rows;
  // Group rows by model
  const kitMap={};
  dataRows.filter(r=>r.some(c=>c!=='')).forEach(r=>{
    const modelo=String(r[0]||'').trim();
    const categoria=String(r[1]||'').trim();
    const componente=String(r[2]||'').trim();
    const cantidad=+(r[3])||1;
    if(!modelo||!componente) return;
    if(!kitMap[modelo]) kitMap[modelo]={nombre:modelo,categoria,componentes:[]};
    kitMap[modelo].componentes.push({id:uid(),nombre:componente,cantidad});
  });
  _importKitRows=Object.values(kitMap);
  if(!_importKitRows.length){ toast('No se encontraron datos válidos','error'); return; }
  const preview=document.getElementById('kit-import-preview');
  if(!preview) return;
  preview.innerHTML=`
    <div style="margin-top:16px;padding:10px 14px;background:var(--gray-50);border-radius:8px;font-size:13px;color:var(--gray-600);margin-bottom:8px">
      Se importarán <strong>${_importKitRows.length} kits</strong> con un total de <strong>${_importKitRows.reduce((s,k)=>s+k.componentes.length,0)} componentes</strong>. Vista previa:
    </div>
    <div style="max-height:280px;overflow-y:auto">
      ${_importKitRows.slice(0,6).map(k=>`
        <div style="padding:10px 14px;border-bottom:1px solid var(--gray-100)">
          <div style="font-weight:600;font-size:13px;margin-bottom:4px">
            🔧 ${k.nombre} <span class="badge badge-blue">${k.categoria||'—'}</span>
            <span style="font-size:11px;color:var(--gray-400);font-weight:400">(${k.componentes.length} componentes)</span>
          </div>
          <div style="font-size:12px;color:var(--gray-500)">${k.componentes.map(c=>c.nombre).join(' · ')}</div>
        </div>`).join('')}
      ${_importKitRows.length>6?`<div style="padding:10px 14px;font-size:12px;color:var(--gray-400);text-align:center">… y ${_importKitRows.length-6} kits más</div>`:''}
    </div>`;
  const footer=document.getElementById('kit-import-footer');
  if(footer) footer.innerHTML=`
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="confirmarImportarKits()">✅ Importar ${_importKitRows.length} kits</button>`;
}

function confirmarImportarKits(){
  if(!_importKitRows.length) return;
  const existentes=getKits();
  const nombresExist=new Set(existentes.map(k=>k.nombre.toLowerCase()));
  let nuevos=0, actualizados=0;
  _importKitRows.forEach(k=>{
    const idx=existentes.findIndex(e=>e.nombre.toLowerCase()===k.nombre.toLowerCase());
    if(idx>=0){
      existentes[idx].componentes=k.componentes;
      existentes[idx].categoria=k.categoria||existentes[idx].categoria;
      actualizados++;
    } else {
      existentes.push({id:uid(),nombre:k.nombre,categoria:k.categoria,componentes:k.componentes,fecha_creacion:today()});
      nuevos++;
    }
  });
  setKits(existentes);
  closeModal();
  toast(`✅ ${nuevos} kits nuevos · ${actualizados} actualizados`,'success');
  renderKits();
}

  const rut=(document.getElementById('cli-rut')?.value||'').trim();

  if(!nombre){ toast('El nombre es obligatorio','error'); return; }
  const clientes=getClientes();

function handleCliExcelDrop(e){
  e.preventDefault();
  document.getElementById('cli-import-drop').classList.remove('drag-over');
  const file=e.dataTransfer.files[0];
  if(file) handleCliExcelFile(file);
}

function handleCliExcelFile(file){
  if(!file) return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=function(ev){
    let rows=[];
    if(ext==='csv'){
      rows=ev.target.result.split('\n').filter(l=>l.trim()).map(l=>l.split(',').map(c=>c.replace(/^"|"$/g,'').trim()));
    } else {
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array'});
      rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
    }
    parseCliExcel(rows);
  };
  if(ext==='csv') reader.readAsText(file); else reader.readAsArrayBuffer(file);
}

function parseCliExcel(rows){
  if(!rows.length){ toast('Archivo vacío','error'); return; }
  const first=(rows[0]||[]).map(c=>String(c).toLowerCase());
  const hasHeader=first.some(c=>c.includes('nombre')||c.includes('rut'));
  const dataRows=hasHeader?rows.slice(1):rows;
  _importClienteRows=dataRows.filter(r=>r.some(c=>c!=='')).map((r,idx)=>({
    _id:'climp_'+idx,
    nombre:String(r[0]||'').trim(),
    apellido:String(r[1]||'').trim(),
    rut:String(r[2]||'').trim(),
    email:String(r[3]||'').trim(),
  }));
  if(!_importClienteRows.length){ toast('No se encontraron datos válidos','error'); return; }
  // Auto-format RUT and capitalize names
  _importClienteRows=_importClienteRows.map(c=>({
    ...c,
    nombre: c.nombre.charAt(0).toUpperCase()+c.nombre.slice(1),
    apellido: c.apellido.charAt(0).toUpperCase()+c.apellido.slice(1),
    rut: c.rut?formatRUT(c.rut.replace(/[^0-9kK]/g,'').toUpperCase()):'',
  }));
  const preview=document.getElementById('cli-import-preview');
  if(!preview) return;
  preview.innerHTML=`
    <div style="margin-top:16px;padding:10px 14px;background:var(--gray-50);border-radius:8px;font-size:13px;color:var(--gray-600);margin-bottom:8px">
      Se importarán <strong>${_importClienteRows.length}</strong> clientes. Vista previa:
    </div>
    <div style="max-height:260px;overflow-y:auto">
      <table><thead><tr><th>Nombre</th><th>Apellido</th><th>RUT</th><th>Email</th></tr></thead>
      <tbody>${_importClienteRows.slice(0,10).map(c=>`<tr>
        <td>${c.nombre||'—'}</td><td>${c.apellido||'—'}</td>
        <td style="font-family:monospace">${c.rut||'—'}</td><td>${c.email||'—'}</td>
      </tr>`).join('')}
      ${_importClienteRows.length>10?`<tr><td colspan="4" style="text-align:center;color:var(--gray-400);font-size:12px">… y ${_importClienteRows.length-10} más</td></tr>`:''}
      </tbody></table>
    </div>`;
  const footer=document.getElementById('cli-import-footer');
  if(footer) footer.innerHTML=`
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="confirmarImportarClientes()">✅ Importar ${_importClienteRows.length} clientes</button>`;
}

function confirmarImportarClientes(){
  if(!_importClienteRows.length) return;
  const existentes=getClientes();
  const rutsExist=new Set(existentes.map(c=>c.rut).filter(Boolean));
  let nuevos=0, dupes=0;
  _importClienteRows.forEach(c=>{
    if(c.rut&&rutsExist.has(c.rut)){ dupes++; return; }
    existentes.push({id:uid(),nombre:c.nombre,apellido:c.apellido,rut:c.rut,email:c.email,fecha_creacion:today()});
    if(c.rut) rutsExist.add(c.rut);
    nuevos++;
  });
  setClientes(existentes);
  closeModal();
  toast(`✅ ${nuevos} clientes importados${dupes?` · ${dupes} duplicados omitidos`:''}`,'success');
  renderClientes();
}

  const items=o.items||[];

  if(!bods.length && o.bodega_nombre) return `<span style="font-size:13px">${o.bodega_nombre}</span>`;
  if(!bods.length) return '<span style="color:var(--gray-400)">—</span>';
  if(bods.length===1) return `<span style="font-size:13px">${bods[0]}</span>`;
  return `<span class="badge-mult" onclick="verOC('${o.id}')">Múltiples (${bods.length})</span>`;
}

  _aplicarCambioEstado(id,'cancelada');

function cambiarEstadoOC(id, estado){
  if(estado==='confirmada'){ modalFolioFactura(id); return; }
  if(!confirm(`¿Cambiar estado a "${estado}"?`)) return;
  _aplicarCambioEstado(id, estado);
}

function _aplicarCambioEstado(id, estado, folio, metodoPago){
  const ocs=getOCs(); const i=ocs.findIndex(o=>o.id===id);
  if(i<0) return;
  ocs[i].estado=estado;
  if(folio!==undefined) ocs[i].folio_factura=folio;
  if(estado==='recibida'){ ocs[i].fecha_recepcion=today(); crearAsientoOCRecibida(ocs[i]); }
  if(estado==='confirmada'){
    ocs[i].fecha_confirmacion=today();
    ocs[i].metodo_pago=metodoPago||'banco';
    if(metodoPago!=='credito') crearAsientoOCPago(ocs[i]);
  }
  setOCs(ocs); toast(`OC ${ocs[i].numero} → ${estado}`); closeModal(); renderOC();
}

function confirmarRecepcion(ocId){
  const oc=getOCs().find(o=>o.id===ocId);
  if(!oc) return;
  const bodSel=document.getElementById('rec-bodega');
  const bodId=bodSel?.value||'';
  const bodNombre=bodId&&bodSel.selectedIndex>0?bodSel.options[bodSel.selectedIndex].text:'';
  if(!bodId){ toast('Selecciona una bodega','error'); return; }
  // Gather items to receive
  const recItems=[];
  (oc.items||[]).forEach((it,idx)=>{
    const el=document.getElementById('rec-qty-'+idx);
    const qty=el?+el.value:0;
    if(qty>0) recItems.push({prod_item_id:it.id,producto_id:it.producto_id||'',
      producto_nombre:it.producto_nombre||it.descripcion||'',cantidad:qty});
  });
  if(!recItems.length){ toast('Ingresa al menos una cantidad mayor a 0','error'); return; }
  const notas=(document.getElementById('rec-notas')?.value||'').trim();
  // Build recepcion event
  const recepcion={id:uid(),fecha:today(),bodega_id:bodId,bodega_nombre:bodNombre,notas,items:recItems};
  // Update stock per warehouse: erp_stock[prod_id+'_'+bodega_id]
  const stock=DB.get('stock')||{};
  recItems.forEach(ri=>{
    if(!ri.producto_id) return;
    const key=ri.producto_id+'_'+bodId;
    stock[key]=(stock[key]||0)+ri.cantidad;
    // Also update product global stock
    const prods=getProductos();
    const pi=prods.findIndex(p=>p.id===ri.producto_id);
    if(pi>=0){ prods[pi].stock=(+prods[pi].stock||0)+ri.cantidad; setProductos(prods); }
  });
  DB.set('stock',stock);
  // Save recepcion to OC
  const ocs=getOCs();
  const i=ocs.findIndex(o=>o.id===ocId);
  if(i<0) return;
  if(!ocs[i].recepciones) ocs[i].recepciones=[];
  ocs[i].recepciones.push(recepcion);
  // Recalculate status
  const prevEstado=ocs[i].estado;
  const nuevoEstado=calcularEstadoOC(ocs[i]);
  ocs[i].estado=nuevoEstado;
  if(nuevoEstado==='recibida'&&prevEstado!=='recibida'){
    ocs[i].fecha_recepcion=today();
    setOCs(ocs);
    crearAsientoOCRecibida(ocs[i]);
  } else {
    if(nuevoEstado==='parcial'&&!ocs[i].fecha_primera_recepcion) ocs[i].fecha_primera_recepcion=today();
    setOCs(ocs);
  }
  closeModal();
  const msgs={recibida:'✅ OC completamente recibida',parcial:'📦 Recepción parcial guardada'};
  toast(msgs[nuevoEstado]||'Recepción guardada','success');
  renderOC();
}

function posicionarDrop(drop){
  const inp=drop.parentElement?.querySelector('input:not([type=hidden])');
  if(!inp) return;
  const rect=inp.getBoundingClientRect();
  // On iOS Safari, getBoundingClientRect is viewport-relative which is correct for position:fixed
  // But clamp to viewport so dropdown never goes off-screen on small displays
  const vpH=window.innerHeight||document.documentElement.clientHeight;
  const dropH=240;
  const top=rect.bottom+4;
  drop.style.top=(top+dropH>vpH && rect.top>dropH ? rect.top-dropH-4 : top)+'px';
  drop.style.left=Math.max(4,rect.left)+'px';
  drop.style.width=rect.width+'px';
  drop.style.maxWidth=(window.innerWidth-8)+'px';
}

function buscarOCProducto(itemId,q){
  const drop=document.getElementById('oc-drop-'+itemId);
  if(!drop) return;
  const prods=getProductos();
  const kits=getKits();
  const ql=q.trim().toLowerCase();
  const matchProds=ql?prods.filter(p=>p.nombre.toLowerCase().includes(ql)).slice(0,8):prods.slice(0,8);
  const matchKits=ql?kits.filter(k=>k.nombre.toLowerCase().includes(ql)).slice(0,4):kits.slice(0,4);
  if(!matchProds.length&&!matchKits.length){ drop.style.display='none'; return; }
  const kitHtml=matchKits.map(k=>`<div class="prod-drop-item"
    onmousedown="selectOCProduct('${itemId}','',this.dataset.nombre,0)"
    ontouchstart="selectOCProduct('${itemId}','',this.dataset.nombre,0)"
    data-nombre="${(k.nombre||'').replace(/"/g,'&quot;')}"
    style="background:#eff6ff;border-left:3px solid var(--primary)">
    <span class="prod-name">🔧 ${k.nombre}</span>
    <span style="font-size:11px;color:var(--primary);font-weight:600">${k.componentes.length} componentes · ${k.categoria||'Kit'}</span>
  </div>`).join('');
  const prodHtml=matchProds.map(p=>`<div class="prod-drop-item"
    onmousedown="selectOCProduct('${itemId}','${p.id}',this.dataset.nombre,${+(p.precio_compra||0)})"
    ontouchstart="selectOCProduct('${itemId}','${p.id}',this.dataset.nombre,${+(p.precio_compra||0)})"
    data-nombre="${(p.nombre||'').replace(/"/g,'&quot;')}">
    <span class="prod-name">${p.nombre}</span>
    <div style="display:flex;gap:6px;align-items:center">
      ${p.unidad?`<span class="prod-unit">${p.unidad}</span>`:''}
      ${p.precio_compra?`<span class="prod-price">${fmt$(p.precio_compra)}</span>`:''}
    </div>
  </div>`).join('');
  drop.innerHTML=(kitHtml?`<div style="padding:4px 10px;font-size:10px;font-weight:700;color:var(--primary);letter-spacing:.5px;background:#eff6ff">KITS</div>${kitHtml}`:'')+
    (prodHtml&&kitHtml?`<div style="padding:4px 10px;font-size:10px;font-weight:700;color:var(--gray-400);letter-spacing:.5px">PRODUCTOS</div>`:'')+(prodHtml||'');
  drop.style.display='block';
  posicionarDrop(drop);
}

function selectOCProduct(itemId,prodId,prodNombre,precio){
  // Check if this product matches a kit
  // Exact match first, then starts-with to avoid false partial matches
  const nl=prodNombre.toLowerCase();
  const kit=getKits().find(k=>k.nombre.toLowerCase()===nl)||getKits().find(k=>k.nombre.toLowerCase().startsWith(nl)&&nl.length>3);
  if(kit&&(kit.componentes||[]).length>0){
    expandirKitEnOC(itemId, kit);
    return;
  }
  const inp=document.getElementById('oc-prod-'+itemId);
  const hidId=document.getElementById('oc-prodid-'+itemId);
  if(inp) inp.value=prodNombre;
  if(hidId) hidId.value=prodId;
  if(precio){
    const pnEl=document.getElementById('oc-pn-'+itemId);
    const piEl=document.getElementById('oc-pi-'+itemId);
    if(pnEl) pnEl.value=precio;
    if(piEl) piEl.value=Math.round(precio*1.19);
  }
  cerrarDrop(itemId);
  calcOCItem(itemId);
}

function expandirKitEnOC(itemId, kit){
  cerrarDrop(itemId);
  // Remove the trigger row and replace with kit components
  const triggerRow=document.getElementById('ocrow-'+itemId);
  const container=document.getElementById('oc-items-container');
  if(!container) return;
  // Insert kit components before the trigger row
  const comps=kit.componentes||[];
  comps.forEach(comp=>{
    const newItem={id:uid(),producto_id:'',producto_nombre:comp.nombre,
      cantidad:comp.cantidad||1,precio_neto:0,precio_iva:0,precio_unitario:0,subtotal:0,
      bodega_id:'',bodega_nombre:''};
    const html=renderOCItemRow(newItem);
    if(triggerRow) triggerRow.insertAdjacentHTML('beforebegin',html);
    else container.insertAdjacentHTML('beforeend',html);
    // Set product name in the new row
    const inp=document.getElementById('oc-prod-'+newItem.id);
    if(inp) inp.value=comp.nombre;
  });
  // Remove trigger row
  if(triggerRow) triggerRow.remove();
  calcOCTotal();
  toast(`🔧 Kit "${kit.nombre}" expandido en ${comps.length} componentes`,'success');
}

function cerrarDrop(itemId){
  const d=document.getElementById('oc-drop-'+itemId);
  if(d) d.style.display='none';
}

  const drop=document.getElementById('oc-prov-drop');
  if(!drop) return;
  const provs=getProveedores();
  const matches=q.trim()
    ? provs.filter(p=>p.nombre.toLowerCase().includes(q.toLowerCase())).slice(0,10)

    onmousedown="selectOCProv('${p.id}',this.dataset.nombre)"

  posicionarDrop(drop);
}

const IVA=0.19;
function onChangeNeto(id){
  const pnEl=document.getElementById('oc-pn-'+id);
  const piEl=document.getElementById('oc-pi-'+id);
  const neto=+(pnEl?.value)||0;
  if(piEl) piEl.value=Math.round(neto*(1+IVA));
  calcOCItem(id);
}
function onChangeIva(id){
  const pnEl=document.getElementById('oc-pn-'+id);
  const piEl=document.getElementById('oc-pi-'+id);
  const piva=+(piEl?.value)||0;
  if(pnEl) pnEl.value=Math.round(piva/(1+IVA));
  calcOCItem(id);
}
function calcOCItem(id){
  const qty=+(document.getElementById('oc-qty-'+id)||{}).value||0;
  const pn=+(document.getElementById('oc-pn-'+id)||{}).value||0;
  const sub=qty*pn;
  const subEl=document.getElementById('oc-sub-'+id);
  if(subEl) subEl.value=fmt$(sub);
  calcOCTotal();
}

function calcOCTotal(){
  let total=0;
  document.querySelectorAll('[id^="oc-qty-"]').forEach(el=>{
    const id=el.id.replace('oc-qty-','');
    const qty=+el.value||0;
    const pnEl=document.getElementById('oc-pn-'+id);
    if(pnEl) total+=qty*(+pnEl.value||0);
  });
  const disp=document.getElementById('oc-total-display');
  if(disp) disp.textContent=fmt$(total);
}

  const fechaEntrega=document.getElementById('oc-entrega').value;
  const bodSel=document.getElementById('oc-bodega');
  const bodId=bodSel?.value||'';
  const bodNombre=bodSel&&bodSel.selectedIndex>0?bodSel.options[bodSel.selectedIndex].text:'';
  const notas=document.getElementById('oc-notas').value;
  const items=[];
  document.querySelectorAll('[id^="oc-qty-"]').forEach(el=>{
    const id=el.id.replace('oc-qty-','');
    const prodNombre=(document.getElementById('oc-prod-'+id)?.value||'').trim();
    const prodId=document.getElementById('oc-prodid-'+id)?.value||'';
    const itemBodSel=document.getElementById('oc-bod-'+id);
    const bodegaId=itemBodSel?.value||'';
    const bodegaNombre=itemBodSel&&itemBodSel.selectedIndex>0?itemBodSel.options[itemBodSel.selectedIndex].text:'';
    const qty=+el.value||1;
    const pn=+(document.getElementById('oc-pn-'+id)||{}).value||0;
    const pi=+(document.getElementById('oc-pi-'+id)||{}).value||Math.round(pn*1.19);
    if(prodNombre) items.push({id,producto_id:prodId,producto_nombre:prodNombre,
      cantidad:qty,precio_neto:pn,precio_iva:pi,precio_unitario:pn,subtotal:qty*pn,
      bodega_id:bodegaId,bodega_nombre:bodegaNombre});
  });
  if(!fecha){ toast('Ingresa una fecha','error'); return; }
  if(!items.length){ toast('Agrega al menos un producto','error'); return; }
  const total=items.reduce((s,i)=>s+i.subtotal,0);
  const ocs=getOCs();
  if(editId){
    const i=ocs.findIndex(o=>o.id===editId);
    if(i<0) return;
    Object.assign(ocs[i],{proveedor_id:provId,proveedor_nombre:provNombre,
      fecha,fecha_entrega:fechaEntrega,bodega_id:bodId,bodega_nombre:bodNombre,notas,items,total});
    setOCs(ocs); closeModal(); toast('OC actualizada'); renderOC();
  } else {
    const oc={id:uid(),numero:'OC-'+String(DB.nextOC()).padStart(5,'0'),estado:'borrador',
      proveedor_id:provId,proveedor_nombre:provNombre,
      fecha,fecha_entrega:fechaEntrega,bodega_id:bodId,bodega_nombre:bodNombre,notas,items,total,fecha_creacion:today()};
    ocs.push(oc); setOCs(ocs); closeModal(); toast('OC creada: '+oc.numero); renderOC();
  }
}

function editarOC(id){
  const oc=getOCs().find(o=>o.id===id);
  if(oc) modalNuevaOC(oc);
}

function eliminarOC(id){
  const ocs=getOCs();
  const oc=ocs.find(o=>o.id===id);
  if(!oc) return;
  if(!confirm(`¿Eliminar la OC ${oc.numero}?\n\nEsta acción no se puede deshacer, pero quedará registrada en el historial de forma permanente.`)) return;
  // Append to immutable log (append-only, never deletable from UI)
  const log=getOCLog();
  log.push(Object.assign({},oc,{_eliminada_en:today(),_eliminada_ts:Date.now()}));
  DB.set('oc_log',log);
  // Remove from active OCs
  setOCs(ocs.filter(o=>o.id!==id));
  toast(`OC ${oc.numero} eliminada y registrada en historial`);
  renderOC();
}

function generarOpcionesMeses(gastos){
  const meses=[...new Set(gastos.map(g=>(g.fecha||'').slice(0,7)).filter(Boolean))].sort().reverse();
  return meses.map(m=>{
    const [y,mo]=m.split('-');
    const nombre=new Date(+y,+mo-1,1).toLocaleDateString('es-CL',{month:'long',year:'numeric'});
    return `<option value="${m}" ${_filtroGastoMes===m?'selected':''}>${nombre}</option>`;
  }).join('');
}

function autoCapDesc(inp){
  if(inp.value.length===1) inp.value=inp.value.toUpperCase();
  else if(inp.value) inp.value=inp.value.charAt(0).toUpperCase()+inp.value.slice(1);
}

function buscarDescSugerencias(q){
  const drop=document.getElementById('qg-desc-drop');
  if(!drop) return;
  const gastos=getGastos();
  // unique descriptions with their most-used category
  const descMap={};
  gastos.forEach(g=>{
    const d=(g.descripcion||'').trim();
    if(!d) return;
    if(!descMap[d]) descMap[d]={desc:d,cat:g.categoria||'',count:0};
    descMap[d].count++;
    descMap[d].cat=g.categoria||descMap[d].cat;
  });
  const all=Object.values(descMap).sort((a,b)=>b.count-a.count);
  const qLow=(q||'').toLowerCase();
  const matches=qLow
    ? all.filter(d=>d.desc.toLowerCase().includes(qLow) && d.desc.toLowerCase()!==qLow).slice(0,8)
    : all.slice(0,8);
  if(!matches.length){ drop.style.display='none'; return; }
  const inp=document.getElementById('qg-desc');
  const rect=inp?.getBoundingClientRect();
  if(rect){ drop.style.top=(rect.bottom+4)+'px'; drop.style.left=rect.left+'px'; drop.style.width=rect.width+'px'; }
  drop.innerHTML=matches.map(d=>{
    const col=getCatColor(d.cat);
    return `<div class="desc-drop-item" onmousedown="selDescSugerencia(${JSON.stringify(d.desc)},${JSON.stringify(d.cat||'')})" ontouchstart="selDescSugerencia(${JSON.stringify(d.desc)},${JSON.stringify(d.cat||'')})">
      <span class="di-name">${d.desc}</span>
      ${d.cat?`<span class="di-cat" style="background:${col}18;color:${col};border:1px solid ${col}40">${d.cat}</span>`:''}
    </div>`;
  }).join('');
  drop.style.display='block';
}

function selDescSugerencia(desc,cat){
  const descEl=document.getElementById('qg-desc');
  if(descEl) descEl.value=desc;
  cerrarDescDrop();
  // auto-select category button
  const cats=getGastoCats();
  const idx=cats.findIndex(c=>c.nombre===cat);
  if(idx>=0){ _grSel=idx; document.querySelectorAll('.gasto-rapido-btn').forEach((b,j)=>b.classList.toggle('sel',j===idx)); actualizarCatDisplay(); }
  document.getElementById('qg-monto')?.focus();
}

function cerrarDescDrop(){
  const d=document.getElementById('qg-desc-drop'); if(d) d.style.display='none';
}

function actualizarCatDisplay(){
  const disp=document.getElementById('qg-cat-display');
  if(!disp) return;
  if(_grSel!==null){
    const cat=getGastoCats()[_grSel];
    if(cat){ const col=cat.color; disp.innerHTML=`<span style="font-size:12px;padding:3px 10px;border-radius:99px;background:${col}18;color:${col};border:1px solid ${col}40">${cat.icono} Categoría: <strong>${cat.nombre}</strong></span>`; }
  } else { disp.innerHTML='<span style="font-size:12px;color:var(--gray-400)">💡 Selecciona una categoría arriba (opcional)</span>'; }

function selGastoRapido(i){

  document.querySelectorAll('.gasto-rapido-btn').forEach((b,j)=>b.classList.toggle('sel',j===_grSel));

function saveGastoRapido(){
  const desc=(document.getElementById('qg-desc')?.value||'').trim();
  const monto=+(document.getElementById('qg-monto')?.value||0);
  const met=document.getElementById('qg-met')?.value||'';

  const cats=getGastoCats();

  if(!monto){ toast('Ingresa un monto','error'); document.getElementById('qg-monto')?.focus(); return; }
  if(!desc){ toast('Ingresa una descripción','error'); document.getElementById('qg-desc')?.focus(); return; }

  toast(`✅ ${desc} — ${fmt$(monto)}`);
  document.getElementById('qg-desc').value='';
  document.getElementById('qg-monto').value='';

function _applyGastoFiltros(gastos){

  return gastos.filter(g=>{
    const matchQ=!q||(g.descripcion||'').toLowerCase().includes(q)||(g.categoria||'').toLowerCase().includes(q)||(g.metodo||'').toLowerCase().includes(q);

    const matchMes=!_filtroGastoMes||((g.fecha||'').startsWith(_filtroGastoMes));

  });

function handleProvExcelDrop(e){
  e.preventDefault();
  document.getElementById('import-drop-zone').classList.remove('drag-over');
  const file=e.dataTransfer.files[0];
  if(file) handleProvExcelFile(file);
}

function handleProvExcelFile(file){
  if(!file) return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=function(e){
    let rows=[];
    if(ext==='csv'){
      const txt=e.target.result;
      const lines=txt.split('\n').filter(l=>l.trim());
      rows=lines.map(l=>l.split(',').map(c=>c.replace(/^"|"$/g,'').trim()));
    } else {
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    }
    parseProvExcel(rows);
  };
  if(ext==='csv') reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

function parseProvExcel(rows){
  if(!rows.length){ toast('Archivo vacío','error'); return; }
  // Detect header row
  const firstRow=(rows[0]||[]).map(c=>String(c).toLowerCase());
  const hasHeader=firstRow.some(c=>c.includes('nombre')||c.includes('rut')||c.includes('email'));
  const dataRows=hasHeader?rows.slice(1):rows;
  _importRows=dataRows.filter(r=>r.some(c=>c!=='')).map((r,idx)=>({
    _id:'imp_'+idx,
    nombre:String(r[0]||'').trim(),
    rut:String(r[1]||'').trim(),
    contacto:String(r[2]||'').trim(),
    telefono:String(r[3]||'').trim(),
    email:String(r[4]||'').trim(),
    direccion:String(r[5]||'').trim(),
    notas:String(r[6]||'').trim(),
    _error:!String(r[0]||'').trim()?'Nombre vacío':''
  }));
  if(!_importRows.length){ toast('No se encontraron datos','error'); return; }
  renderImportPreview();
}

function renderImportPreview(){
  const ok=_importRows.filter(r=>!r._error).length;
  const bad=_importRows.filter(r=>r._error).length;
  document.getElementById('import-preview-area').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;margin-bottom:8px">
      <div>
        <strong style="font-size:15px">${_importRows.length} filas detectadas</strong>
        <span style="margin-left:10px;color:var(--success);font-size:13px">✅ ${ok} válidas</span>
        ${bad?`<span style="margin-left:8px;color:var(--danger);font-size:13px">⚠️ ${bad} con error</span>`:''}
      </div>
      <button class="btn btn-sm btn-outline" onclick="addImportRow()">➕ Agregar fila</button>
    </div>
    <div class="import-preview">
    <table>
      <thead><tr>
        <th style="width:22px">#</th>
        ${PROV_COLS.map(c=>`<th>${PROV_LABELS[c]}</th>`).join('')}
        <th style="width:32px"></th>
      </tr></thead>
      <tbody id="import-tbody">
        ${_importRows.map((r,i)=>renderImportRow(r,i)).join('')}
      </tbody>
    </table>
    </div>`;
  document.getElementById('import-footer').innerHTML=`
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="confirmarImportProveedores()">💾 Importar ${ok} proveedor${ok!==1?'es':''}</button>`;
}

function renderImportRow(r,i){
  const hasErr=r._error;
  return `<tr id="imrow-${r._id}" style="${hasErr?'background:#fff5f5':''}">
    <td style="color:var(--gray-400);font-size:12px">${i+1}</td>
    ${PROV_COLS.map(col=>`<td><input value="${escHtml(r[col]||'')}" 
      oninput="_importRows[${i}]['${col}']=this.value;_importRows[${i}]._error=!_importRows[${i}].nombre.trim()?'Nombre vacío':'';updateImportRowStatus(${i})"
      style="${col==='nombre'&&hasErr?'border-color:var(--danger)':''}">`).join('')}
    <td><button class="import-row-del" onclick="removeImportRow('${r._id}')">🗑</button></td>
  </tr>`;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function updateImportRowStatus(i){
  // Re-render just the counter
  const ok=_importRows.filter(r=>!r._error).length;
  const bad=_importRows.filter(r=>r._error).length;
  const importBtn=document.querySelector('#import-footer .btn-primary');
  if(importBtn) importBtn.textContent=`💾 Importar ${ok} proveedor${ok!==1?'es':''}`;
}

function removeImportRow(id){
  _importRows=_importRows.filter(r=>r._id!==id);
  renderImportPreview();
}

function addImportRow(){
  const newRow={_id:'imp_new_'+Date.now(),nombre:'',rut:'',contacto:'',telefono:'',email:'',direccion:'',notas:'',_error:'Nombre vacío'};
  _importRows.push(newRow);
  renderImportPreview();
  // Focus first input of last row
  setTimeout(()=>{
    const rows=document.querySelectorAll('#import-tbody tr');
    if(rows.length){ const inp=rows[rows.length-1].querySelector('input'); if(inp) inp.focus(); }
  },50);
}

function confirmarImportProveedores(){
  const validos=_importRows.filter(r=>r.nombre.trim());
  if(!validos.length){ toast('No hay filas válidas','error'); return; }
  const provs=getProveedores();
  const existentes=new Set(provs.map(p=>p.nombre.toLowerCase().trim()));
  let nuevos=0, duplicados=0;
  validos.forEach(r=>{
    const nombre=r.nombre.trim();
    if(existentes.has(nombre.toLowerCase())){ duplicados++; return; }
    provs.push({id:uid(),nombre,rut:r.rut,contacto:r.contacto,telefono:r.telefono,
      email:r.email,direccion:r.direccion,notas:r.notas,fecha_creacion:today()});
    existentes.add(nombre.toLowerCase()); nuevos++;
  });
  setProveedores(provs);
  closeModal();
  toast(`✅ ${nuevos} proveedor${nuevos!==1?'es':''} importado${nuevos!==1?'s':''}`+(duplicados?` (${duplicados} duplicado${duplicados!==1?'s':''} omitido${duplicados!==1?'s':''})`:'')); 
  renderProveedores();
}

  </tr></thead>
  <tbody>${prods.map(p=>`<tr>
    <td style="font-family:monospace;font-size:12px;color:var(--gray-500)">${p.sku||'—'}</td>
    <td><strong>${p.nombre}</strong></td>

    </div></td>
  </tr>`).join('')}</tbody></table>`;
}

function filtrarProductos(){
  const q=document.getElementById('prod-search').value.toLowerCase();
  const prods=getProductos().filter(p=>(p.nombre||'').toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q)||(p.categoria||'').toLowerCase().includes(q));
  document.getElementById('prods-table').innerHTML=renderProdsTable(prods);
}

function eliminarProducto(id){
  if(!confirm('¿Eliminar este producto?')) return;
  setProductos(getProductos().filter(p=>p.id!==id));
  toast('Producto eliminado'); renderProductos();
}

function nextSKU(){
  const prods=getProductos();
  let max=0;
  prods.forEach(p=>{
    if(!p.sku) return;
    const m=p.sku.match(/(\d+)$/);
    if(m){ const n=parseInt(m[1],10); if(n>max) max=n; }
  });
  const next=max+1;
  return 'SKU-'+String(next).padStart(3,'0');
}

    <div class="modal-footer">

function modalEditarProducto(id){
  const p=getProductos().find(x=>x.id===id);
  if(p) modalNuevoProducto(p);
}

function saveProducto(editId){
  const nombre=document.getElementById('pr-nombre').value.trim();
  if(!nombre){ toast('El nombre es obligatorio','error'); return; }
  const skuVal=document.getElementById('pr-sku').value.trim();
  if(skuVal){
    const existing=getProductos();
    const dupSKU=existing.find(p=>p.sku&&p.sku.toLowerCase()===skuVal.toLowerCase()&&p.id!==editId);
    if(dupSKU){ toast(`SKU "${skuVal}" ya está en uso por "${dupSKU.nombre}"`, 'error'); return; }
  }
  const prod={
    nombre,
    sku:skuVal,
    unidad:document.getElementById('pr-unidad').value,
    precio_compra:+document.getElementById('pr-precio').value||0,
    precio_venta:+document.getElementById('pr-pventa').value||0,
    stock:+document.getElementById('pr-stock').value||0,
    stock_min:+document.getElementById('pr-stock-min').value||0,
    categoria:document.getElementById('pr-cat').value.trim(),
    subcategoria:document.getElementById('pr-subcat').value.trim(),
    enlace:document.getElementById('pr-enlace').value.trim(),
    descripcion:document.getElementById('pr-desc').value.trim()
  };
  const prods=getProductos();
  if(editId){ const i=prods.findIndex(p=>p.id===editId); if(i>=0) Object.assign(prods[i],prod); }
  else { prod.id=uid(); prods.push(prod); }
  setProductos(prods); closeModal(); toast(editId?'Producto actualizado':'Producto guardado'); renderProductos();
}

let _importProdRows=[];

  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([
    ['SKU','Producto','Costo Neto','Precio Venta','Stock','Categoría','Subcategoría','Enlace'],
    ['SKU-001','Pantalla iPhone 13',15000,45000,10,'iPhones','Pantallas','iPhone 13'],
    ['SKU-002','Batería iPhone 13',8000,22000,15,'iPhones','Baterías','iPhone 13'],
    ['SKU-003','Cámara iPhone 13',20000,55000,8,'iPhones','Cámaras','iPhone 13'],
    ['SKU-004','Batería MacBook Pro',25000,75000,5,'MacBooks','Baterías','MacBook Pro 14'],
  ]);
  ws['!cols']=[{wch:14},{wch:30},{wch:14},{wch:14},{wch:8},{wch:16},{wch:16},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'Productos');
  XLSX.writeFile(wb,'plantilla_productos.xlsx');
}

function modalImportarProductos(){
  _importProdRows=[];
  showModal(`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:700px">
    <div class="modal-header"><h3>📊 Importar Productos desde Excel</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p style="margin:0 0 12px;color:var(--gray-500);font-size:13px">
        💡 Descarga la <strong style="cursor:pointer;text-decoration:underline" onclick="descargarPlantillaProductos()">plantilla Excel</strong> para asegurarte que las columnas estén correctas.
        Columnas: <strong>SKU, Producto, Costo Neto, Precio Venta, Stock, Categoría, Subcategoría, Enlace</strong>
      </p>
      <div id="prod-drop-zone" ondragover="event.preventDefault()" ondrop="handleProdExcelDrop(event)"
        style="border:2px dashed var(--gray-300);border-radius:8px;padding:40px;text-align:center;cursor:pointer;background:var(--gray-50)" onclick="document.getElementById('prod-file-inp').click()">
        <div style="font-size:32px;margin-bottom:8px">📂</div>
        <p style="margin:0;color:var(--gray-500)">Arrastra tu archivo Excel aquí o <strong>haz clic para seleccionar</strong></p>
        <input type="file" id="prod-file-inp" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleProdExcelFile(this.files[0])">
      </div>
      <div id="prod-import-preview" style="margin-top:16px"></div>
    </div>
    <div class="modal-footer" id="prod-import-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    </div>
  </div></div>`);
}

function handleProdExcelDrop(e){
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(file) handleProdExcelFile(file);
}

function handleProdExcelFile(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      parseProdExcel(raw);
    }catch(err){ toast('Error leyendo el archivo: '+err.message,'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function parseProdExcel(rows){
  if(!rows||rows.length<2){ toast('El archivo está vacío o sin datos','error'); return; }
  // Find header row
  const headerRow=rows[0].map(h=>String(h).toLowerCase().trim());
  const colSKU=headerRow.findIndex(h=>h.includes('sku')||h.includes('código')||h.includes('codigo'));
  const colNombre=headerRow.findIndex(h=>h.includes('producto')||h.includes('nombre'));
  const colCosto=headerRow.findIndex(h=>h.includes('costo'));
  const colPventa=headerRow.findIndex(h=>h.includes('precio venta')||h.includes('precio_venta')||h.includes('venta'));
  const colStock=headerRow.findIndex(h=>h.includes('stock'));
  const colCat=headerRow.findIndex(h=>h.includes('categor'));
  const colSubcat=headerRow.findIndex(h=>h.includes('subcat'));
  const colEnlace=headerRow.findIndex(h=>h.includes('enlace')||h.includes('kit')||h.includes('equipo'));

  if(colNombre<0){ toast('No se encontró columna "Producto"','error'); return; }

  _importProdRows=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    const nombre=String(row[colNombre]||'').trim();
    if(!nombre) continue;
    _importProdRows.push({
      sku:colSKU>=0?String(row[colSKU]||'').trim():'',
      nombre,
      precio_compra:colCosto>=0?+row[colCosto]||0:0,
      precio_venta:colPventa>=0?+row[colPventa]||0:0,
      stock:colStock>=0?+row[colStock]||0:0,
      categoria:colCat>=0?String(row[colCat]||'').trim():'',
      subcategoria:colSubcat>=0?String(row[colSubcat]||'').trim():'',
      enlace:colEnlace>=0?String(row[colEnlace]||'').trim():'',
    });
  }

  if(!_importProdRows.length){ toast('No se encontraron productos válidos','error'); return; }

  // Clasificar filas: actualizar (mismo SKU) o nuevo
  const existing=getProductos();
  const skuMap={}; // sku -> index en existing
  existing.forEach((p,i)=>{ if(p.sku) skuMap[p.sku.toLowerCase()]=i; });
  let nuevos=0, actualizados=0;
  _importProdRows.forEach(p=>{
    if(p.sku && skuMap[p.sku.toLowerCase()]!==undefined) actualizados++;
    else nuevos++;
  });

  const previewHtml=`
    <div style="background:var(--gray-50);border-radius:6px;padding:12px;margin-bottom:12px;font-size:13px;display:flex;gap:24px;flex-wrap:wrap">
      <span>📦 <strong>${_importProdRows.length}</strong> productos encontrados</span>
      ${nuevos?`<span style="color:#10b981">✅ <strong>${nuevos}</strong> nuevos</span>`:''}
      ${actualizados?`<span style="color:#3b82f6">🔄 <strong>${actualizados}</strong> se actualizarán (mismo SKU)</span>`:''}
    </div>
    <div style="max-height:280px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:6px">
    <table style="width:100%;font-size:12px"><thead><tr style="background:var(--gray-100)">
      <th style="padding:6px 8px;text-align:left">SKU</th>
      <th style="padding:6px 8px;text-align:left">Producto</th>
      <th style="padding:6px 8px;text-align:right">Costo</th>
      <th style="padding:6px 8px;text-align:right">P.Venta</th>
      <th style="padding:6px 8px;text-align:center">Stock</th>
      <th style="padding:6px 8px;text-align:left">Categoría</th>
      <th style="padding:6px 8px;text-align:left">Subcategoría</th>
      <th style="padding:6px 8px;text-align:left">Enlace</th>
      <th style="padding:6px 8px;text-align:center">Estado</th>
    </tr></thead><tbody>
    ${_importProdRows.map(p=>{
      const isUpdate=p.sku&&skuMap[p.sku.toLowerCase()]!==undefined;
      const bg=isUpdate?'#eff6ff':'';
      const badge=isUpdate
        ?'<span style="color:#3b82f6;font-size:11px;font-weight:600">🔄 Actualizar</span>'
        :'<span style="color:#10b981;font-size:11px;font-weight:600">✅ Nuevo</span>';
      return `<tr style="background:${bg}">
        <td style="padding:5px 8px;font-family:monospace;color:var(--gray-500)">${p.sku||'—'}</td>
        <td style="padding:5px 8px"><strong>${p.nombre}</strong></td>
        <td style="padding:5px 8px;text-align:right">${p.precio_compra?fmt$(p.precio_compra):'—'}</td>
        <td style="padding:5px 8px;text-align:right;color:#10b981">${p.precio_venta?fmt$(p.precio_venta):'—'}</td>
        <td style="padding:5px 8px;text-align:center">${p.stock||0}</td>
        <td style="padding:5px 8px">${p.categoria||'—'}</td>
        <td style="padding:5px 8px">${p.subcategoria||'—'}</td>
        <td style="padding:5px 8px">${p.enlace?`<span style="background:#ede9fe;color:#7c3aed;padding:1px 6px;border-radius:10px;font-size:11px">${p.enlace}</span>`:'—'}</td>
        <td style="padding:5px 8px;text-align:center">${badge}</td>
      </tr>`;
    }).join('')}
    </tbody></table></div>`;

  document.getElementById('prod-import-preview').innerHTML=previewHtml;
  document.getElementById('prod-import-footer').innerHTML=`
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="confirmarImportarProductos()">✅ ${nuevos+actualizados} producto${nuevos+actualizados!==1?'s':''} (${nuevos} nuevo${nuevos!==1?'s':''}, ${actualizados} actualizar)</button>`;
}

function confirmarImportarProductos(){
  const prods=getProductos();
  const skuMap={};
  prods.forEach((p,i)=>{ if(p.sku) skuMap[p.sku.toLowerCase()]=i; });
  let added=0, updated=0;
  _importProdRows.forEach(p=>{
    const campos={
      nombre:p.nombre, sku:p.sku,
      precio_compra:p.precio_compra, precio_venta:p.precio_venta,
      stock:p.stock, categoria:p.categoria,
      subcategoria:p.subcategoria, enlace:p.enlace||''
    };
    if(p.sku && skuMap[p.sku.toLowerCase()]!==undefined){
      // Actualizar existente — conserva id, unidad, stock_min, descripcion salvo que vengan en el excel
      Object.assign(prods[skuMap[p.sku.toLowerCase()]], campos);
      updated++;
    } else {
      prods.push({...campos,id:uid(),unidad:'unidad',stock_min:0,descripcion:''});
      added++;
    }
  });
  setProductos(prods);
  closeModal();
  const msg=`✅ ${added} nuevo${added!==1?'s':''}, 🔄 ${updated} actualizado${updated!==1?'s':''}`;
  toast(msg,'success');
  renderProductos();
}

function renderBodegasTable(bodegas){
  if(!bodegas.length) return `<div class="empty-state"><div class="empty-icon">🏭</div><h3>Sin bodegas</h3><p>Agrega las bodegas o puntos de almacenamiento</p></div>`;
  return `<table><thead><tr><th>Nombre</th><th>Dirección</th><th>Responsable</th><th>Notas</th><th>Acciones</th></tr></thead>

function eliminarBodega(id){
  if(!confirm('¿Eliminar esta bodega?')) return;
  setBodegas(getBodegas().filter(b=>b.id!==id));
  toast('Bodega eliminada'); renderBodegas();
}

function modalNuevaBodega(bEdit){
  const isEdit=!!bEdit;
  showModal(`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header"><h3>${isEdit?'Editar':'Nueva'} Bodega</h3><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Nombre *</label><input id="b-nombre" value="${bEdit?bEdit.nombre||'':''}" placeholder="Bodega Principal"></div>

      <div class="form-group"><label>Responsable</label><input id="b-resp" value="${bEdit?bEdit.responsable||'':''}" placeholder="Nombre responsable"></div>
      <div class="form-group"><label>Notas</label><textarea id="b-notas" rows="2">${bEdit?bEdit.notas||'':''}</textarea></div>

    </div>

function modalEditarBodega(id){
  const b=getBodegas().find(x=>x.id===id);
  if(b) modalNuevaBodega(b);
}

function saveBodega(editId){
  const nombre=document.getElementById('b-nombre').value.trim();
  if(!nombre){ toast('El nombre es obligatorio','error'); return; }
  const bodega={nombre,direccion:document.getElementById('b-dir').value.trim(),
    responsable:document.getElementById('b-resp').value.trim(),
    notas:document.getElementById('b-notas').value.trim()};
  const bodegas=getBodegas();
  if(editId){ const i=bodegas.findIndex(b=>b.id===editId); if(i>=0) Object.assign(bodegas[i],bodega); }
  else { bodega.id=uid(); bodegas.push(bodega); }
  setBodegas(bodegas); closeModal(); toast(editId?'Bodega actualizada':'Bodega guardada'); renderBodegas();
}

        <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start">

          </div>

            <div style="font-size:11px;color:var(--gray-400);margin-bottom:4px;font-weight:600">📋 GASTOS</div>
