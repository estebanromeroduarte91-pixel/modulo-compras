<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprobación de presupuesto</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.10);max-width:460px;width:100%;padding:32px 28px}
    .logo{font-size:13px;color:#6b7280;margin-bottom:24px;text-align:center}
    .icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
    .icon.pending{background:#eff6ff}
    .icon.ok{background:#f0fdf4}
    .icon.ko{background:#fef2f2}
    h1{font-size:20px;font-weight:700;text-align:center;color:#111827;margin-bottom:6px}
    .sub{font-size:14px;color:#6b7280;text-align:center;margin-bottom:24px}
    .info-box{background:#f9fafb;border-radius:10px;padding:16px;margin-bottom:24px}
    .info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:14px;gap:12px}
    .info-row:last-child{border-bottom:none}
    .info-label{color:#6b7280;white-space:nowrap}
    .info-val{font-weight:600;color:#111827;text-align:right}
    .presup{font-size:22px;font-weight:800;color:#111827;text-align:center;margin-bottom:20px}
    .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s;margin-bottom:10px;font-family:inherit}
    .btn:active{opacity:.85}
    .btn-green{background:#16a34a;color:#fff}
    .btn-red{background:#fff;color:#dc2626;border:2px solid #dc2626}
    .btn-disabled{background:#e5e7eb;color:#9ca3af;cursor:default}
    .msg{text-align:center;font-size:15px;padding:20px 0;color:#374151}
    .loader{text-align:center;padding:40px;color:#6b7280;font-size:14px}
    #actions{display:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Solicitud de aprobación de presupuesto</div>
    <div id="content">
      <div class="loader">Cargando solicitud...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const _SB_URL = 'https://nfcdqdbhrsjhbnbtqewl.supabase.co';
    const _SB_KEY = 'sb_publishable_hbmva0O8zTFwr-EfnqBUdw_X8lwOPoZ';
    const sb = supabase.createClient(_SB_URL, _SB_KEY);

    const params = new URLSearchParams(window.location.search);
    const token = params.get('t');
    let _record = null;

    async function load() {
      const cont = document.getElementById('content');
      if (!token) { cont.innerHTML = renderError('Link inválido', 'El enlace no contiene un token de aprobación.'); return; }
      const { data, error } = await sb.from('aprobaciones').select('*').eq('token', token).single();
      if (error || !data) { cont.innerHTML = renderError('Solicitud no encontrada', 'Es posible que el link haya expirado o sea incorrecto.'); return; }
      _record = data;
      if (data.estado === 'aprobado') { cont.innerHTML = renderFinal('aprobado', data); return; }
      if (data.estado === 'rechazado') { cont.innerHTML = renderFinal('rechazado', data); return; }
      cont.innerHTML = renderPending(data);
    }

    function renderPending(d) {
      const presup = d.presupuesto ? `$${Number(d.presupuesto).toLocaleString('es-CL')}` : '—';
      return `
        <div class="icon pending">📋</div>
        <h1>Solicitud de aprobación</h1>
        <p class="sub">Por favor revisa el detalle y confirma tu aprobación</p>
        <div class="info-box">
          ${d.cliente ? `<div class="info-row"><span class="info-label">Cliente</span><span class="info-val">${d.cliente}</span></div>` : ''}
          ${d.equipo ? `<div class="info-row"><span class="info-label">Equipo</span><span class="info-val">${d.equipo}</span></div>` : ''}
          ${d.trabajo ? `<div class="info-row"><span class="info-label">Trabajo</span><span class="info-val">${d.trabajo}</span></div>` : ''}
          ${d.orden_num ? `<div class="info-row"><span class="info-label">N° orden</span><span class="info-val">#${d.orden_num}</span></div>` : ''}
        </div>
        <div class="presup">${presup}</div>
        <button class="btn btn-green" onclick="responder('aprobado')">✅ Aprobar presupuesto</button>
        <button class="btn btn-red" onclick="responder('rechazado')">✗ No aprobar</button>
        <p style="font-size:12px;color:#9ca3af;text-align:center;margin-top:8px">Al aprobar, autorizas el inicio del trabajo indicado por el presupuesto indicado.</p>
      `;
    }

    function renderFinal(estado, d) {
      if (estado === 'aprobado') return `
        <div class="icon ok">✅</div>
        <h1>¡Presupuesto aprobado!</h1>
        <p class="msg">Gracias <strong>${d.cliente||''}</strong>, hemos recibido tu aprobación.<br>Nos pondremos en contacto pronto.</p>
      `;
      return `
        <div class="icon ko">❌</div>
        <h1>Presupuesto no aprobado</h1>
        <p class="msg">Hemos registrado tu respuesta. Si tienes dudas, contáctanos directamente.</p>
      `;
    }

    function renderError(titulo, msg) {
      return `<div class="icon ko">⚠️</div><h1>${titulo}</h1><p class="msg">${msg}</p>`;
    }

    async function responder(estado) {
      const btns = document.querySelectorAll('.btn');
      btns.forEach(b => { b.disabled = true; b.style.opacity = '.5'; });
      const { error } = await sb.from('aprobaciones')
        .update({ estado, aprobado_en: new Date().toISOString() })
        .eq('token', token);
      if (error) {
        btns.forEach(b => { b.disabled = false; b.style.opacity = '1'; });
        alert('Error al enviar tu respuesta. Intenta de nuevo.');
        return;
      }
      document.getElementById('content').innerHTML = renderFinal(estado, _record);
    }

    load();
  </script>
</body>
</html>
